<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Súlyvadász</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<style>
:root{
    --bg:#0f172a;
    --panel:#111827;
    --card:#1e293b;
    --card2:#273449;
    --input:#334155;
    --line:#334155;
    --text:#f8fafc;
    --muted:#94a3b8;
    --green:#22c55e;
    --greenDark:#14532d;
    --red:#ef4444;
    --redDark:#7f1d1d;
    --yellow:#eab308;
    --shadow:0 14px 34px rgba(0,0,0,.28);
}

*{
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0 auto;
    padding:14px;
    padding-bottom:42px;
    max-width:560px;
    min-height:100vh;
    background:
        radial-gradient(circle at top left, rgba(34,197,94,.10), transparent 34%),
        linear-gradient(180deg, #0f172a 0%, #111827 100%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    box-sizing:border-box;
}

.header{
    background:linear-gradient(135deg, #1e293b, #111827);
    padding:14px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:12px;
    border:1px solid rgba(148,163,184,.16);
    box-shadow:var(--shadow);
}

.brandBlock{
    min-width:0;
}

.appName{
    font-size:22px;
    font-weight:950;
    letter-spacing:-.4px;
    line-height:1.05;
}

.appSub{
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
    font-weight:700;
    letter-spacing:.2px;
}

.menuBtn{
    width:auto;
    padding:10px 13px;
    font-size:14px;
    border-radius:14px;
    background:#0b1220;
    color:var(--text);
    border:1px solid rgba(148,163,184,.18);
    box-shadow:0 8px 16px rgba(0,0,0,.18);
}

.card{
    background:linear-gradient(180deg, var(--card), #1b2535);
    border-radius:18px;
    padding:12px;
    margin-bottom:10px;
    border:1px solid rgba(148,163,184,.12);
    box-shadow:0 8px 22px rgba(0,0,0,.16);
}

input{
    width:100%;
    box-sizing:border-box;
    border:1px solid rgba(148,163,184,.16);
    border-radius:15px;
    padding:15px 14px;
    font-size:31px;
    background:var(--input);
    color:var(--text);
    font-weight:900;
    outline:none;
    box-shadow:inset 0 2px 8px rgba(0,0,0,.20);
}

input:focus{
    border-color:rgba(34,197,94,.75);
    box-shadow:0 0 0 3px rgba(34,197,94,.16), inset 0 2px 8px rgba(0,0,0,.20);
}

button{
    width:100%;
    border:none;
    border-radius:16px;
    padding:16px;
    font-size:18px;
    font-weight:900;
    cursor:pointer;
}

button:active{
    transform:translateY(1px);
}

.grayBtn{
    background:linear-gradient(135deg, #22c55e, #16a34a);
    color:#04130a;
    margin-bottom:10px;
    box-shadow:0 12px 24px rgba(22,163,74,.20);
}

.closeDayBtn{
    background:linear-gradient(135deg, #7f1d1d, #991b1b);
    color:white;
    margin-top:12px;
    padding:13px;
    font-size:15px;
    font-weight:900;
    border:1px solid rgba(248,113,113,.55);
    box-shadow:0 10px 22px rgba(127,29,29,.22);
}

.dangerBtn{
    background:linear-gradient(135deg, #7f1d1d, #450a0a);
    color:white;
    margin-top:16px;
    padding:14px;
    font-size:15px;
    font-weight:900;
    border:1px solid rgba(239,68,68,.7);
}

.stat{
    background:linear-gradient(180deg, var(--card), #182233);
    padding:14px;
    border-radius:20px;
    margin-top:10px;
    margin-bottom:10px;
    border:1px solid rgba(148,163,184,.13);
    box-shadow:var(--shadow);
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    font-size:16px;
    margin:0;
    padding:10px 0;
    border-bottom:1px solid rgba(148,163,184,.10);
    color:#dbeafe;
}

.row:last-child{
    border-bottom:none;
}

.row span{
    font-size:18px;
    font-weight:950;
    color:#fff;
}

.totalRow{
    margin-top:4px;
    padding-top:13px;
    color:#bbf7d0;
}

.totalRow span{
    color:var(--green);
    font-size:22px;
}

.hotRow{
    color:#fed7aa;
}

.hotRow span{
    color:#fb923c;
    font-size:20px;
}

.creatorFooter{
    text-align:center;
    font-size:12px;
    opacity:0.58;
    margin-top:18px;
    margin-bottom:10px;
    color:#d1d5db;
}

.small{
    font-size:12px;
    color:var(--muted);
    opacity:1;
    font-weight:850;
    text-transform:uppercase;
    letter-spacing:.6px;
    margin-bottom:7px;
}

.weightBanner{
    position:sticky;
    top:0;
    z-index:999;
    background:#dc2626;
    color:white;
    text-align:center;
    font-size:20px;
    font-weight:950;
    padding:12px;
    border-radius:18px;
    margin-bottom:12px;
    border:1px solid rgba(255,255,255,.16);
    box-shadow:0 12px 28px rgba(0,0,0,.35);
    letter-spacing:.2px;
}

.quoteBox{
    display:none;
    background:rgba(30,41,59,.78);
    color:#cbd5e1;
    border-left:4px solid var(--green);
    border-radius:16px;
    padding:10px 12px;
    margin-bottom:12px;
    font-size:13px;
    font-weight:700;
    line-height:1.35;
    border-top:1px solid rgba(148,163,184,.10);
    border-right:1px solid rgba(148,163,184,.10);
    border-bottom:1px solid rgba(148,163,184,.10);
}

#kartonBox{
    display:none;
}

/* MENU */
.menuOverlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(2,6,23,.72);
    backdrop-filter:blur(8px);
    z-index:2000;
    padding:14px;
    box-sizing:border-box;
}

.menuPanel{
    background:linear-gradient(180deg, #0f172a, #111827);
    border:1px solid rgba(148,163,184,.18);
    border-radius:22px;
    height:calc(100vh - 28px);
    height:calc(100dvh - 28px);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
    padding:14px;
    box-sizing:border-box;
    box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.menuHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.menuTitle{
    font-size:23px;
    font-weight:950;
    letter-spacing:-.3px;
}

.menuClose{
    width:auto;
    padding:10px 14px;
    background:#1e293b;
    color:white;
    font-size:16px;
    border:1px solid rgba(148,163,184,.16);
}

.menuTabs{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:12px;
    position:sticky;
    top:0;
    z-index:2;
    background:linear-gradient(180deg, #0f172a 0%, rgba(15,23,42,.92) 100%);
    padding-bottom:8px;
}

.menuTab{
    padding:12px 8px;
    font-size:14px;
    background:#1e293b;
    color:#dbeafe;
    border:1px solid rgba(148,163,184,.13);
}

.menuTab.active{
    background:linear-gradient(135deg, #22c55e, #16a34a);
    color:#031407;
}

.menuCard{
    background:linear-gradient(180deg, var(--card), #182233);
    border-radius:18px;
    padding:13px;
    margin-bottom:10px;
    border:1px solid rgba(148,163,184,.12);
    box-shadow:0 8px 22px rgba(0,0,0,.16);
}

.menuCardTitle{
    font-size:16px;
    font-weight:950;
    margin-bottom:7px;
    letter-spacing:-.1px;
}

.menuLine{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:7px 0;
    margin:0;
    font-size:15px;
    border-bottom:1px solid rgba(148,163,184,.09);
    color:#cbd5e1;
}

.menuLine:last-child{
    border-bottom:none;
}

.menuLine b{
    color:#fff;
    font-weight:950;
    text-align:right;
}

.good{
    color:var(--green) !important;
    font-weight:950;
}

.bad{
    color:#f87171 !important;
    font-weight:950;
}

.empty{
    opacity:.78;
    text-align:center;
    padding:20px;
    background:rgba(30,41,59,.55);
    border-radius:18px;
}

.historySummary{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    list-style:none;
    cursor:pointer;
}

.historySummary::-webkit-details-marker{
    display:none;
}

.historyTotal{
    font-size:19px;
    font-weight:950;
    color:var(--green);
    white-space:nowrap;
    background:rgba(34,197,94,.10);
    border:1px solid rgba(34,197,94,.18);
    border-radius:14px;
    padding:8px 10px;
}

.historyDetails{
    margin-top:12px;
    padding-top:10px;
    border-top:1px solid rgba(148,163,184,.14);
}

.historyPick{
    background:#0f172a;
    border-radius:14px;
    padding:11px;
    margin-top:8px;
    font-size:14px;
    border:1px solid rgba(148,163,184,.10);
}

.privacyBtn{
    background:linear-gradient(135deg, #1e293b, #0f172a);
    color:#e5e7eb;
    margin-bottom:10px;
    border:1px solid rgba(148,163,184,.18);
    font-size:15px;
    padding:13px;
}

.privacyBtn.active{
    background:linear-gradient(135deg, #14532d, #166534);
    color:#fff;
    border-color:rgba(34,197,94,.65);
}

.privacyHint{
    text-align:center;
    font-size:12px;
    color:var(--muted);
    margin-top:-4px;
    margin-bottom:10px;
}

.privacyMode #menuContent[data-tab="elozmenyek"] .menuLine b,
.privacyMode #menuContent[data-tab="elozmenyek"] .historyTotal,
.privacyMode #menuContent[data-tab="elozmenyek"] .historySummary .small,
.privacyMode #menuContent[data-tab="elozmenyek"] .historyPick div,
.privacyMode #menuContent[data-tab="atlagok"] .menuLine b,
.privacyMode #menuContent[data-tab="atlagok"] .historyTotal,
.privacyMode #menuContent[data-tab="atlagok"] .historySummary .small{
    filter:blur(7px);
    user-select:none;
}

.settingNote{
    font-size:13px;
    color:var(--muted);
    line-height:1.38;
    margin:8px 0 12px;
}

.settingBtn{
    background:#1e293b;
    color:white;
    border:1px solid rgba(148,163,184,.18);
    padding:13px;
    font-size:15px;
}

.settingBtn.active{
    background:linear-gradient(135deg, #14532d, #166534);
    border-color:rgba(34,197,94,.65);
    color:white;
}

.deleteMiniBtn{
    background:#7f1d1d;
    color:white;
    border:1px solid rgba(239,68,68,.72);
    padding:9px 10px;
    font-size:13px;
    border-radius:12px;
    margin-top:8px;
}

.deleteDayBtn{
    background:#451a1a;
    color:#fecaca;
    border:1px solid #7f1d1d;
    padding:10px;
    font-size:13px;
    border-radius:12px;
    margin-top:12px;
}

@media (max-width:380px){
    body{
        padding:12px;
    }

    .appName{
        font-size:20px;
    }

    input{
        font-size:29px;
    }

    .menuTab{
        font-size:13px;
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="brandBlock">
        <div class="appName">⚖️ Súlyvadász</div>
        <div class="appSub">Raktári napi összesítő</div>
    </div>
    <button class="menuBtn" onclick="openMenu()">☰ Menü</button>
</div>

<div id="weightBanner" class="weightBanner">
    0 kg
</div>

<div id="quoteBox" class="quoteBox">
    Mai bölcsesség...
</div>

<button class="privacyBtn" onclick="toggleHiddenMode()" id="privacyBtn">
🙈 Rejtett mód: KI
</button>

<div id="privacyHint" class="privacyHint" style="display:none;">
A statisztikai számok el vannak rejtve, de amit beírsz, azt látod.
</div>


<div class="card">
    <div class="small">TÉTEL</div>
    <input id="t" type="tel" inputmode="numeric">
</div>

<div class="card" id="kartonBox">
    <div class="small">KARTON</div>
    <input id="k" type="tel" inputmode="numeric">
</div>

<div class="card">
    <div class="small">SÚLY</div>
    <input id="s" type="tel" inputmode="numeric">
</div>

<div class="stat">
    <div class="row">Tétel <span id="st">0</span></div>
    <div class="row hotRow">700-as <span id="h700">0</span></div>
    <div class="row totalRow">~Összegység <span id="sum">0</span></div>
</div>

<button class="grayBtn" onclick="add()">➕ HOZZÁADÁS</button>

<button class="closeDayBtn" onclick="closePicking()">
📅 Szedés lezárása
</button>

<div class="creatorFooter">
    © 2026 Horváth Balázs · Súlyvadász · All rights reserved.
</div>

<!-- MENU -->
<div id="menuOverlay" class="menuOverlay">
    <div class="menuPanel">

        <div class="menuHeader">
            <div class="menuTitle">☰ Menü</div>
            <button class="menuClose" onclick="closeMenu()">✕</button>
        </div>

        <div class="menuTabs">
            <button class="menuTab active" data-tab="elozmenyek" onclick="showMenuTab('elozmenyek')">
                Előzmények
            </button>

            <button class="menuTab" data-tab="atlagok" onclick="showMenuTab('atlagok')">
                Átlagok
            </button>

            <button class="menuTab" data-tab="beallitasok" onclick="showMenuTab('beallitasok')">
                Beállítások
            </button>

            <button class="menuTab" data-tab="changelog" onclick="showMenuTab('changelog')">
                Changelog
            </button>
        </div>

        <div id="menuContent"></div>

        <div id="dangerZone">
            <button class="dangerBtn" onclick="deleteAllData()">
                🗑️ Összes adat törlése
            </button>
        </div>

    </div>
</div>

<script>
let kartonMod = localStorage.getItem("kartonMod") === "1";
let hiddenMode = localStorage.getItem("hiddenMode") === "1";

function getTodayKey(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
}

let today = getTodayKey();

function loadJson(key, fallback){
    try{
        const saved = localStorage.getItem(key);
        return saved ? JSON.parse(saved) : fallback;
    }
    catch(e){
        localStorage.removeItem(key);
        return fallback;
    }
}

let data = loadJson("data", {});
let closedPickings = loadJson("closedPickings", []);

if(!data || typeof data !== "object" || Array.isArray(data)){
    data = {};
}

if(!Array.isArray(closedPickings)){
    closedPickings = [];
}

function createEmptyDay(){
    return {
        tetel:0,
        karton:0,
        suly:0,
        rendeles:0,
        hetszazas:0,
        hetszazasSzeria:0
    };
}

function ensureTodayData(){
    today = getTodayKey();
    let changed = false;

    if(!data[today]){
        data[today] = createEmptyDay();
        changed = true;
    }

    if(data[today].tetel === undefined){ data[today].tetel = 0; changed = true; }
    if(data[today].karton === undefined){ data[today].karton = 0; changed = true; }
    if(data[today].suly === undefined){ data[today].suly = 0; changed = true; }
    if(data[today].rendeles === undefined){ data[today].rendeles = 0; changed = true; }
    if(data[today].hetszazas === undefined){ data[today].hetszazas = 0; changed = true; }
    if(data[today].hetszazasSzeria === undefined){ data[today].hetszazasSzeria = 0; changed = true; }

    if(changed){
        saveData();
    }
}

ensureTodayData();

function saveData(){
    localStorage.setItem("data", JSON.stringify(data));
}

function saveClosed(){
    localStorage.setItem("closedPickings", JSON.stringify(closedPickings));
}

function fmt(n){
    return Number(n || 0).toLocaleString("hu-HU");
}

const FIZETES_SZORZO = 1.64;
const HETSZAZAS_LIMIT = 680;

function fmtDecimal(n){
    return Number(n || 0).toLocaleString("hu-HU", {
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function getBecsultFizetes(osszegyseg){
    return Math.round(Number(osszegyseg || 0) * FIZETES_SZORZO);
}

function showFt(n){
    return hiddenMode ? "•••• Ft" : fmt(n) + " Ft";
}

function showRate(){
    return fmtDecimal(FIZETES_SZORZO) + " Ft / egység";
}

function hiddenText(suffix){
    return "••••" + (suffix || "");
}

function showNumber(n){
    return hiddenMode ? "••••" : fmt(n);
}

function showKg(n){
    return hiddenMode ? "•••• kg" : fmt(n) + " kg";
}

function showApprox(n){
    return hiddenMode ? "~••••" : "~" + fmt(n);
}

function getBecsultKarton(tetel){
    // 1000 tétel ≈ 2000 karton, tehát 1 tételre kb. 2 karton jut.
    return Math.round(Number(tetel || 0) * 2);
}

function getOsszegyseg(tetel, suly){
    const t = Number(tetel || 0);
    const s = Number(suly || 0);
    const becsultKarton = getBecsultKarton(t);

    return s + t + becsultKarton;
}

// régi név kompatibilitás miatt
function getEgyseg(tetel, suly){
    return getOsszegyseg(tetel, suly);
}

const quotes = [
    "700-as? Kurva érdekes.",
    "Kurva érdekes...",
    "Nem megy, csicska?",
    "Ne zavarj!",
    "Hagyjad, majd én szedem a szarját.",
    "Súlyos papír, szebb nap.",
    "Ez már nem szedés, ez vadászat.",
    "A kg nem hazudik, csak odaver.",
    "A raktár nem kérdez, csak kioszt.",
    "Ne nézd, szedd.",
    "Ha súlyos a papír, szebb a nap.",
    "Aki a súlyt hozza, az viszi a napot.",
    "Szedni kell, nem magyarázni.",
    "A tétel jön-megy, a kg marad.",
    "Súlyvadász üzemmód aktiválva."
];

function showDailyQuote(){
    const todayQuoteKey = getTodayKey();
    const savedQuoteDate = localStorage.getItem("quoteDate");
    const savedQuoteText = localStorage.getItem("quoteText");

    const quoteBox = document.getElementById("quoteBox");
    if(!quoteBox) return;

    if(savedQuoteDate === todayQuoteKey && savedQuoteText){
        quoteBox.innerText = savedQuoteText;
        quoteBox.style.display = "block";
        return;
    }

    const randomIndex = Math.floor(Math.random() * quotes.length);
    const todaysQuote = quotes[randomIndex];

    localStorage.setItem("quoteDate", todayQuoteKey);
    localStorage.setItem("quoteText", todaysQuote);

    quoteBox.innerText = todaysQuote;
    quoteBox.style.display = "block";
}


function updateHiddenModeUI(){
    const btn = document.getElementById("privacyBtn");
    const hint = document.getElementById("privacyHint");

    document.body.classList.toggle("privacyMode", hiddenMode);

    if(btn){
        btn.classList.toggle("active", hiddenMode);
        btn.innerText = hiddenMode ? "🙈 Rejtett mód: BE" : "👁️ Rejtett mód: KI";
    }

    if(hint){
        hint.style.display = hiddenMode ? "block" : "none";
    }
}

function toggleHiddenMode(){
    hiddenMode = !hiddenMode;
    localStorage.setItem("hiddenMode", hiddenMode ? "1" : "0");
    updateHiddenModeUI();
    render();

    const overlay = document.getElementById("menuOverlay");
    if(overlay && overlay.style.display === "block"){
        const activeTab = document.querySelector(".menuTab.active");
        showMenuTab(activeTab ? activeTab.dataset.tab : "elozmenyek");
    }
}

function updateKartonModeUI(){
    const box = document.getElementById("kartonBox");
    const btn = document.getElementById("settingsKartonBtn");
    const state = document.getElementById("settingsKartonState");

    if(box){
        box.style.display = kartonMod ? "block" : "none";
    }

    if(btn){
        btn.classList.toggle("active", kartonMod);
        btn.innerText = kartonMod ? "Karton mód: BE" : "Karton mód: KI";
    }

    if(state){
        state.innerText = kartonMod ? "Bekapcsolva" : "Kikapcsolva";
    }
}

function toggleKartonMod(){
    kartonMod = !kartonMod;
    localStorage.setItem("kartonMod", kartonMod ? "1" : "0");
    updateKartonModeUI();
}


function togglePentek(){
    toggleKartonMod();
}

function add(){
    ensureTodayData();

    const tInput = document.getElementById("t");
    const kInput = document.getElementById("k");
    const sInput = document.getElementById("s");

    const t = Number(tInput.value) || 0;
    const k = Number(kInput.value) || 0;
    const s = Number(sInput.value) || 0;

    if(t === 0){
        alert("0 tétellel nem lehet hozzáadni.");
        tInput.focus();
        return;
    }

    if(t > 120){
        const biztosTetel = confirm(
            "Kurva érdekes..\n\n" +
            "Biztos ennyi tétel?\n\n" +
            (hiddenMode ? "" : t + " tétel")
        );

        if(!biztosTetel){
            tInput.focus();
            return;
        }
    }

    if(s > 750){
        const biztos = confirm(
            "Kurva érdekes..\n\n" +
            "Biztos ennyi?\n\n" +
            (hiddenMode ? "" : s + " kg")
        );

        if(!biztos){
            sInput.focus();
            return;
        }
    }

    data[today].tetel += t;
    data[today].karton += kartonMod ? k : 0;
    data[today].suly += s;

    // 1 hozzáadás = 1 kiszedett rendelés / bolt
    data[today].rendeles += 1;

    // 700-as: 680 kg feletti rendelés.
    // Ha több ilyen jön egymás után, a felső súlysáv tűz ikonnal jelez.
    if(s > HETSZAZAS_LIMIT){
        data[today].hetszazas += 1;
        data[today].hetszazasSzeria += 1;
    }
    else{
        data[today].hetszazasSzeria = 0;
    }

    saveData();

    tInput.value = "";
    kInput.value = "";
    sInput.value = "";

    render();

    setTimeout(function(){
        tInput.focus();
    }, 100);
}

function render(){
    ensureTodayData();

    const d = data[today];

    const banner = document.getElementById("weightBanner");

    if(banner){
        // Rejtett módban csak a számot takarjuk el,
        // a színjelzés marad, hogy lásd a 10 000 / 13 000 kg határt.
        const fireIcon = Number(d.hetszazasSzeria || 0) > 2 ? " 🔥" : "";
        banner.innerText = (hiddenMode ? "•••• kg" : fmt(d.suly) + " kg") + fireIcon;

        if(d.suly < 10000){
            banner.style.background = "#dc2626";
            banner.style.color = "#fff";
        }
        else if(d.suly < 13000){
            banner.style.background = "#16a34a";
            banner.style.color = "#fff";
        }
        else{
            banner.style.background = "#eab308";
            banner.style.color = "#000";
        }
    }

    const stEl = document.getElementById("st");
    const h700El = document.getElementById("h700");
    const sumEl = document.getElementById("sum");

    if(stEl) stEl.innerText = showNumber(d.tetel);
    if(h700El) h700El.innerText = showNumber(d.hetszazas);
    if(sumEl) sumEl.innerText = showNumber(getOsszegyseg(d.tetel, d.suly));
}

function closePicking(){
    ensureTodayData();

    const d = data[today];

    if(d.tetel === 0 && d.karton === 0 && d.suly === 0 && d.rendeles === 0){
        alert("Nincs mit lezárni.");
        return;
    }

    if(!confirm("Biztosan le akarod zárni a szedést?")) return;

    const now = new Date();

    const record = {
        id: Date.now(),
        datum: today,
        ido: now.toLocaleTimeString("hu-HU", {
            hour:"2-digit",
            minute:"2-digit"
        }),
        tetel: Number(d.tetel || 0),
        karton: Number(d.karton || 0),
        suly: Number(d.suly || 0),
        rendeles: Number(d.rendeles || 0),
        hetszazas: Number(d.hetszazas || 0),
        becsultKarton: getBecsultKarton(d.tetel),
        osszegyseg: getOsszegyseg(d.tetel, d.suly)
    };

    closedPickings.push(record);
    saveClosed();

    data[today] = createEmptyDay();
    saveData();

    document.getElementById("t").value = "";
    document.getElementById("k").value = "";
    document.getElementById("s").value = "";

    updateKartonModeUI();
    render();

    setTimeout(function(){
        document.getElementById("t").focus();
    }, 100);

    alert(
        "Szedés lezárva!\n\n" +
        "Súly: " + showKg(record.suly) + "\n" +
        "Tétel: " + showNumber(record.tetel) + "\n" +
        "Karton: " + showNumber(record.karton) + "\n" +
        "Kiszedett rendelések: " + showNumber(record.rendeles) + "\n" +
        "700-as: " + showNumber(record.hetszazas) + "\n" +
        "Becsült karton: " + showApprox(record.becsultKarton) + "\n" +
        "~Összegység: " + showNumber(record.osszegyseg)
    );
}

function showMenuTab(tab){
    document.querySelectorAll(".menuTab").forEach(function(btn){
        btn.classList.remove("active");

        if(btn.dataset.tab === tab){
            btn.classList.add("active");
        }
    });

    const box = document.getElementById("menuContent");
    if(!box) return;

    box.dataset.tab = tab;

    if(tab === "elozmenyek"){
        box.innerHTML = renderElozmenyek();
    }

    if(tab === "atlagok"){
        box.innerHTML = renderAtlagok();
    }

    if(tab === "beallitasok"){
        box.innerHTML = renderBeallitasok();
        updateKartonModeUI();
    }

    if(tab === "changelog"){
        box.innerHTML = renderChangelog();
    }

    const dangerZone = document.getElementById("dangerZone");

    if(dangerZone){
        dangerZone.style.display = tab === "beallitasok" ? "block" : "none";
    }
}

function getRendelesCount(r){
    const v = Number(r.rendeles || 0);

    if(v > 0){
        return v;
    }

    // régi lezárt adatoknál még nem volt rendelés-számláló
    return 1;
}

function getDayStats(){
    const map = {};

    closedPickings.forEach(function(r){
        const datum = r.datum || "Ismeretlen";

        if(!map[datum]){
            map[datum] = {
                datum:datum,
                tetel:0,
                karton:0,
                suly:0,
                rendeles:0,
                hetszazas:0,
                becsultKarton:0,
                osszegyseg:0,
                lezartBlokk:0
            };
        }

        const tetel = Number(r.tetel || 0);
        const karton = Number(r.karton || 0);
        const suly = Number(r.suly || 0);
        const rendeles = getRendelesCount(r);
        const hetszazas = Number(r.hetszazas || 0);

        map[datum].tetel += tetel;
        map[datum].karton += karton;
        map[datum].suly += suly;
        map[datum].rendeles += rendeles;
        map[datum].hetszazas += hetszazas;
        map[datum].becsultKarton += getBecsultKarton(tetel);
        map[datum].osszegyseg += getOsszegyseg(tetel, suly);
        map[datum].lezartBlokk++;
    });

    return Object.values(map).sort(function(a,b){
        return b.datum.localeCompare(a.datum);
    });
}

function getMonthLabel(monthKey){
    const parts = String(monthKey || "").split("-");
    const year = parts[0] || "";
    const month = Number(parts[1] || 0);

    const names = [
        "január",
        "február",
        "március",
        "április",
        "május",
        "június",
        "július",
        "augusztus",
        "szeptember",
        "október",
        "november",
        "december"
    ];

    if(!year || !month || !names[month - 1]){
        return monthKey || "Ismeretlen hónap";
    }

    return year + " " + names[month - 1];
}

function getMonthStats(days){
    const map = {};

    days.forEach(function(d){
        const honap = String(d.datum || "Ismeretlen").slice(0,7);

        if(!map[honap]){
            map[honap] = {
                honap:honap,
                napok:0,
                tetel:0,
                karton:0,
                suly:0,
                rendeles:0,
                hetszazas:0,
                becsultKarton:0,
                osszegyseg:0
            };
        }

        map[honap].napok++;
        map[honap].tetel += Number(d.tetel || 0);
        map[honap].karton += Number(d.karton || 0);
        map[honap].suly += Number(d.suly || 0);
        map[honap].rendeles += Number(d.rendeles || 0);
        map[honap].becsultKarton += Number(d.becsultKarton || 0);
        map[honap].osszegyseg += Number(d.osszegyseg || 0);
    });

    return Object.values(map).sort(function(a,b){
        return b.honap.localeCompare(a.honap);
    });
}

function refreshActiveMenu(){
    const overlay = document.getElementById("menuOverlay");

    if(overlay && overlay.style.display === "block"){
        const activeTab = document.querySelector(".menuTab.active");
        showMenuTab(activeTab ? activeTab.dataset.tab : "elozmenyek");
    }
}

function deleteClosedPicking(id){
    const numericId = Number(id || 0);

    if(!numericId){
        alert("Ezt a régi bejegyzést nem tudom külön törölni, mert nincs azonosítója.");
        return;
    }

    const record = closedPickings.find(function(r){
        return Number(r.id || 0) === numericId;
    });

    if(!record){
        alert("Nem találom ezt a lezárást.");
        return;
    }

    const biztos = confirm(
        "Biztosan törlöd ezt a lezárást a statisztikából?\n\n" +
        (record.datum || "") + " " + (record.ido || "") + "\n" +
        "Súly: " + showKg(record.suly) + "\n" +
        "Tétel: " + showNumber(record.tetel) + "\n\n" +
        "Ez csak ezt az egy bejegyzést törli."
    );

    if(!biztos) return;

    closedPickings = closedPickings.filter(function(r){
        return Number(r.id || 0) !== numericId;
    });

    saveClosed();
    refreshActiveMenu();

    alert("A kiválasztott lezárás törölve lett a statisztikából.");
}

function deleteDayData(datum){
    const count = closedPickings.filter(function(r){
        return (r.datum || "Ismeretlen") === datum;
    }).length;

    if(count === 0){
        alert("Ehhez a naphoz nincs törölhető lezárás.");
        return;
    }

    const biztos = confirm(
        "Biztosan törlöd ezt a teljes napot a statisztikából?\n\n" +
        datum + "\n" +
        "Törölt lezárások száma: " + count + "\n\n" +
        "Ez a többi napot nem bántja."
    );

    if(!biztos) return;

    closedPickings = closedPickings.filter(function(r){
        return (r.datum || "Ismeretlen") !== datum;
    });

    saveClosed();
    refreshActiveMenu();

    alert("A kiválasztott nap törölve lett a statisztikából.");
}

function deleteAllData(){
    const biztos = confirm(
        "Biztosan törölni akarod az összes eddigi adatot?\n\n" +
        "Ez törli:\n" +
        "- a lezárt szedéseket\n" +
        "- a napi adatokat\n" +
        "- az átlagokat\n" +
        "- a tesztadatokat\n\n" +
        "Ezt nem lehet visszavonni."
    );

    if(!biztos) return;

    const kod = prompt(
        "A végleges törléshez írd be pontosan:\n\nTORLES"
    );

    if(kod !== "TORLES"){
        alert("Törlés megszakítva.");
        return;
    }

    localStorage.removeItem("data");
    localStorage.removeItem("closedPickings");

    data = {};
    closedPickings = [];

    today = getTodayKey();
    data[today] = createEmptyDay();

    saveData();
    saveClosed();

    document.getElementById("t").value = "";
    document.getElementById("k").value = "";
    document.getElementById("s").value = "";

    updateKartonModeUI();
    render();

    if(document.getElementById("menuOverlay").style.display === "block"){
        showMenuTab("elozmenyek");
    }

    alert("Minden eddigi adat törölve.");
}
