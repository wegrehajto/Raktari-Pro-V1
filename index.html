<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Szedőcsicska V2</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<style>

body{
    margin:0;
    padding:16px;
    padding-bottom:140px;
    background:#111827;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.header{
    background:#374151;
    padding:16px;
    border-radius:14px;
    text-align:center;
    font-size:20px;
    font-weight:800;
    margin-bottom:12px;
}

.card{
    background:#1f2937;
    border-radius:14px;
    padding:12px;
    margin-bottom:10px;
}

input{
    width:100%;
    box-sizing:border-box;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:28px;
    background:#374151;
    color:white;
    font-weight:700;
}

button{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:18px;
    font-weight:800;
}

.saveBtn{
    position:fixed;
    left:12px;
    right:12px;
    bottom:12px;
    height:70px;
    background:#22c55e;
    color:black;
    font-size:22px;
}

.grayBtn{
    background:#4b5563;
    color:white;
    margin-bottom:10px;
}

.stat{
    background:#1f2937;
    padding:14px;
    border-radius:14px;
    margin-top:10px;
}

.row{
    display:flex;
    justify-content:space-between;
    font-size:18px;
    margin:6px 0;
}

.small{
    font-size:13px;
    opacity:0.7;
}

.weightBanner{
    position:sticky;
    top:0;
    z-index:999;
    background:#dc2626;
    color:white;
    text-align:center;
    font-size:18px;
    font-weight:800;
    padding:10px;
    border-radius:12px;
    margin-bottom:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
}

#kartonBox{display:none;}

</style>
</head>

<body>

<div class="header">📦Szedőcsicska V2</div>
<div id="weightBanner" class="weightBanner">
    0 kg
</div>
<button class="grayBtn" onclick="togglePentek()" id="pbtn">
Karton mód 
</button>

<div class="card">
<div class="small">TÉTEL</div>
<input id="t" type="tel" inputmode="numeric">
</div>

<div class="card" id="kartonBox">
<div class="small">KARTON</div>
<input id="k" type="tel" inputmode="numeric">
</div>

<div class="card">
<div class="small">SÚLY</div>
<input id="s" type="tel" inputmode="numeric">
</div>

<button class="grayBtn" onclick="add()">➕ HOZZÁADÁS</button>
<button class="grayBtn" onclick="showHistory()">📅 Előző napok</button>

<div class="stat">
<div class="row"><b>Mai összesítés</b></div>
<div class="row">Tétel <span id="st">0</span></div>
<div class="row">Karton <span id="sk">0</span></div>
<div class="row">Súly <span id="ss">0</span></div>
<div class="row"><b>Napi egység</b> <b id="sum">0</b></div>
</div>

<div class="stat">
<div class="row"><b>Előző napok</b></div>
<div id="history"></div>
</div>

<button class="saveBtn" onclick="resetDay()">Szedés befejezése</button>

<script>

let pentek = false;

let today = new Date().toISOString().split("T")[0];

let data = JSON.parse(localStorage.getItem("data") || "{}");

if(!data[today]){
    data[today] = {tetel:0,karton:0,suly:0};
}

function togglePentek(){
    pentek = !pentek;
    document.getElementById("kartonBox").style.display = pentek ? "block" : "none";
}

function add(){

    const t = Number(document.getElementById("t").value) || 0;
    const k = Number(document.getElementById("k").value) || 0;
    const s = Number(document.getElementById("s").value) || 0;

    if(t === 0 && k === 0 && s === 0) return;

    // 📦 mentés
    data[today].tetel += t;
    data[today].karton += pentek ? k : 0;
    data[today].suly += s;

    localStorage.setItem("data", JSON.stringify(data));

    // 🧠 UI frissítés CSAK data-ból (EZ A LÉNYEG)
    render();

    // 🧼 input reset
    document.getElementById("t").value = "";
    document.getElementById("k").value = "";
    document.getElementById("s").value = "";

    document.getElementById("t").focus();
}
function render(){

    const d = data[today];
    const banner = document.getElementById("weightBanner");

banner.innerText = d.suly.toLocaleString("hu-HU") + " kg";

if(d.suly < 10000){
    banner.style.background = "#dc2626"; // piros
}
else if(d.suly < 13000){
    banner.style.background = "#16a34a"; // zöld
}
else{
    banner.style.background = "#eab308"; // sárga
    banner.style.color = "#000";
}

    document.getElementById("st").innerText = d.tetel;
    document.getElementById("sk").innerText = d.karton;
    document.getElementById("ss").innerText = d.suly;

    document.getElementById("sum").innerText =
        d.tetel + d.karton + d.suly;
}
    
function resetDay(){

    if(!confirm("Biztos lezárod a műszakot?")) return;

    data[today] = { tetel:0, karton:0, suly:0 };
    localStorage.setItem("data", JSON.stringify(data));

    // ❌ EZT TÖRÖLD LOGIKAILAG (nem kell többé)
    st = 0;
    sk = 0;
    sg = 0;

    // UI teljes újrarajzolás
    render();

    document.getElementById("tetel").value = "";
    document.getElementById("karton").value = "";
    document.getElementById("suly").value = "";

    pentek = false;
    document.getElementById("kartonBox").style.display = "none";
    document.getElementById("pbtn").innerText =
pentek ? "Karton mód ✅" : "Karton mód ";
}

render();

</script>

</body>
</html>
