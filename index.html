<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Súlyvadász</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<style>
:root{
    --bg:#0f172a;
    --panel:#111827;
    --card:#1e293b;
    --card2:#273449;
    --input:#334155;
    --line:#334155;
    --text:#f8fafc;
    --muted:#94a3b8;
    --green:#22c55e;
    --greenDark:#14532d;
    --red:#ef4444;
    --redDark:#7f1d1d;
    --yellow:#eab308;
    --shadow:0 14px 34px rgba(0,0,0,.28);
}

*{
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0 auto;
    padding:14px;
    padding-bottom:96px;
    max-width:560px;
    min-height:100vh;
    background:
        radial-gradient(circle at top left, rgba(34,197,94,.10), transparent 34%),
        linear-gradient(180deg, #0f172a 0%, #111827 100%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    box-sizing:border-box;
}

.header{
    background:linear-gradient(135deg, #1e293b, #111827);
    padding:14px;
    border-radius:20px;
    display:flex;
    justify-content:flex-start;
    align-items:center;
    gap:12px;
    margin-bottom:12px;
    border:1px solid rgba(148,163,184,.16);
    box-shadow:var(--shadow);
}

.brandBlock{
    min-width:0;
}

.appName{
    font-size:22px;
    font-weight:950;
    letter-spacing:-.4px;
    line-height:1.05;
}

.appSub{
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
    font-weight:700;
    letter-spacing:.2px;
}


.card{
    background:linear-gradient(180deg, var(--card), #1b2535);
    border-radius:18px;
    padding:12px;
    margin-bottom:10px;
    border:1px solid rgba(148,163,184,.12);
    box-shadow:0 8px 22px rgba(0,0,0,.16);
}

input{
    width:100%;
    box-sizing:border-box;
    border:1px solid rgba(148,163,184,.16);
    border-radius:15px;
    padding:15px 14px;
    font-size:31px;
    background:var(--input);
    color:var(--text);
    font-weight:900;
    outline:none;
    box-shadow:inset 0 2px 8px rgba(0,0,0,.20);
}

input:focus{
    border-color:rgba(34,197,94,.75);
    box-shadow:0 0 0 3px rgba(34,197,94,.16), inset 0 2px 8px rgba(0,0,0,.20);
}

button{
    width:100%;
    border:none;
    border-radius:16px;
    padding:16px;
    font-size:18px;
    font-weight:900;
    cursor:pointer;
}

button:active{
    transform:translateY(1px);
}

.grayBtn{
    background:linear-gradient(135deg, #22c55e, #16a34a);
    color:#04130a;
    margin-bottom:10px;
    box-shadow:0 12px 24px rgba(22,163,74,.20);
}

.closeDayBtn{
    background:linear-gradient(135deg, #7f1d1d, #991b1b);
    color:white;
    margin-top:12px;
    padding:13px;
    font-size:15px;
    font-weight:900;
    border:1px solid rgba(248,113,113,.55);
    box-shadow:0 10px 22px rgba(127,29,29,.22);
}

.dangerBtn{
    background:linear-gradient(135deg, #7f1d1d, #450a0a);
    color:white;
    margin-top:16px;
    padding:14px;
    font-size:15px;
    font-weight:900;
    border:1px solid rgba(239,68,68,.7);
}

.stat{
    background:linear-gradient(180deg, var(--card), #182233);
    padding:14px;
    border-radius:20px;
    margin-top:10px;
    margin-bottom:10px;
    border:1px solid rgba(148,163,184,.13);
    box-shadow:var(--shadow);
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    font-size:16px;
    margin:0;
    padding:10px 0;
    border-bottom:1px solid rgba(148,163,184,.10);
    color:#dbeafe;
}

.row:last-child{
    border-bottom:none;
}

.row span{
    font-size:18px;
    font-weight:950;
    color:#fff;
}

.totalRow{
    margin-top:4px;
    padding-top:13px;
    color:#bbf7d0;
}

.totalRow span{
    color:var(--green);
    font-size:22px;
}

.hotRow{
    color:#fed7aa;
}

.hotRow span{
    color:#fb923c;
    font-size:20px;
}

.creatorFooter{
    text-align:center;
    font-size:12px;
    opacity:0.58;
    margin-top:18px;
    margin-bottom:10px;
    color:#d1d5db;
}

.small{
    font-size:12px;
    color:var(--muted);
    opacity:1;
    font-weight:850;
    text-transform:uppercase;
    letter-spacing:.6px;
    margin-bottom:7px;
}

.weightBanner{
    position:sticky;
    top:0;
    z-index:999;
    background:#dc2626;
    color:white;
    text-align:center;
    font-size:20px;
    font-weight:950;
    padding:12px;
    border-radius:18px;
    margin-bottom:12px;
    border:1px solid rgba(255,255,255,.16);
    box-shadow:0 12px 28px rgba(0,0,0,.35);
    letter-spacing:.2px;
}

.quoteBox{
    display:none;
    background:rgba(30,41,59,.78);
    color:#cbd5e1;
    border-left:4px solid var(--green);
    border-radius:16px;
    padding:10px 12px;
    margin-bottom:12px;
    font-size:13px;
    font-weight:700;
    line-height:1.35;
    border-top:1px solid rgba(148,163,184,.10);
    border-right:1px solid rgba(148,163,184,.10);
    border-bottom:1px solid rgba(148,163,184,.10);
}

#kartonBox{
    display:none;
}

/* MENU */
.menuOverlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(2,6,23,.72);
    backdrop-filter:blur(8px);
    z-index:2000;
    padding:14px;
    box-sizing:border-box;
}

.menuPanel{
    background:linear-gradient(180deg, #0f172a, #111827);
    border:1px solid rgba(148,163,184,.18);
    border-radius:22px;
    height:calc(100vh - 28px);
    height:calc(100dvh - 28px);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
    padding:14px;
    box-sizing:border-box;
    box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.menuCard{
    background:linear-gradient(180deg, var(--card), #182233);
    border-radius:18px;
    padding:13px;
    margin-bottom:10px;
    border:1px solid rgba(148,163,184,.12);
    box-shadow:0 8px 22px rgba(0,0,0,.16);
}

.menuCardTitle{
    font-size:16px;
    font-weight:950;
    margin-bottom:7px;
    letter-spacing:-.1px;
}

.menuLine{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:7px 0;
    margin:0;
    font-size:15px;
    border-bottom:1px solid rgba(148,163,184,.09);
    color:#cbd5e1;
}

.menuLine:last-child{
    border-bottom:none;
}

.menuLine b{
    color:#fff;
    font-weight:950;
    text-align:right;
}

.good{
    color:var(--green) !important;
    font-weight:950;
}

.bad{
    color:#f87171 !important;
    font-weight:950;
}

.empty{
    opacity:.78;
    text-align:center;
    padding:20px;
    background:rgba(30,41,59,.55);
    border-radius:18px;
}

.historySummary{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    list-style:none;
    cursor:pointer;
}

.historySummary::-webkit-details-marker{
    display:none;
}

.historyTotal{
    font-size:19px;
    font-weight:950;
    color:var(--green);
    white-space:nowrap;
    background:rgba(34,197,94,.10);
    border:1px solid rgba(34,197,94,.18);
    border-radius:14px;
    padding:8px 10px;
}

.historyDetails{
    margin-top:12px;
    padding-top:10px;
    border-top:1px solid rgba(148,163,184,.14);
}

.historyPick{
    background:#0f172a;
    border-radius:14px;
    padding:11px;
    margin-top:8px;
    font-size:14px;
    border:1px solid rgba(148,163,184,.10);
}

.privacyBtn{
    background:linear-gradient(135deg, #1e293b, #0f172a);
    color:#e5e7eb;
    margin-bottom:10px;
    border:1px solid rgba(148,163,184,.18);
    font-size:15px;
    padding:13px;
}

.privacyBtn.active{
    background:linear-gradient(135deg, #14532d, #166534);
    color:#fff;
    border-color:rgba(34,197,94,.65);
}

.privacyHint{
    text-align:center;
    font-size:12px;
    color:var(--muted);
    margin-top:-4px;
    margin-bottom:10px;
}

.privacyMode #menuContent[data-tab="elozmenyek"] .menuLine b,
.privacyMode #menuContent[data-tab="elozmenyek"] .historyTotal,
.privacyMode #menuContent[data-tab="elozmenyek"] .historySummary .small,
.privacyMode #menuContent[data-tab="elozmenyek"] .historyPick div,
.privacyMode #menuContent[data-tab="atlagok"] .menuLine b,
.privacyMode #menuContent[data-tab="atlagok"] .historyTotal,
.privacyMode #menuContent[data-tab="atlagok"] .historySummary .small,
.privacyMode #menuContent[data-tab="atlagok"] .avgQuickValue{
    filter:blur(7px);
    user-select:none;
}

.settingNote{
    font-size:13px;
    color:var(--muted);
    line-height:1.38;
    margin:8px 0 12px;
}

.settingBtn{
    background:#1e293b;
    color:white;
    border:1px solid rgba(148,163,184,.18);
    padding:13px;
    font-size:15px;
}

.settingBtn.active{
    background:linear-gradient(135deg, #14532d, #166534);
    border-color:rgba(34,197,94,.65);
    color:white;
}

.deleteMiniBtn{
    background:#7f1d1d;
    color:white;
    border:1px solid rgba(239,68,68,.72);
    padding:9px 10px;
    font-size:13px;
    border-radius:12px;
    margin-top:8px;
}

.deleteDayBtn{
    background:#451a1a;
    color:#fecaca;
    border:1px solid #7f1d1d;
    padding:10px;
    font-size:13px;
    border-radius:12px;
    margin-top:12px;
}


.settingInput{
    width:100%;
    box-sizing:border-box;
    margin:8px 0 10px;
    border:1px solid rgba(148,163,184,.18);
    border-radius:14px;
    padding:12px;
    font-size:17px;
    background:#0f172a;
    color:var(--text);
    font-weight:800;
    outline:none;
}

.vacationTag{
    display:inline-block;
    background:rgba(234,179,8,.12);
    color:#fde68a;
    border:1px solid rgba(234,179,8,.25);
    border-radius:999px;
    padding:4px 9px;
    font-size:12px;
    font-weight:900;
    margin-bottom:8px;
}

.vacationCard{
    border-color:rgba(234,179,8,.22);
}

.vacationMini{
    background:#0f172a;
    border:1px solid rgba(234,179,8,.18);
    border-radius:14px;
    padding:11px;
    margin-top:8px;
}


.inputHistoryCard{
    margin-top:10px;
    border-color:rgba(34,197,94,.18);
}

.historyListHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
}

.undoBtn{
    width:auto;
    background:#334155;
    color:#e2e8f0;
    border:1px solid rgba(148,163,184,.18);
    padding:9px 11px;
    font-size:13px;
    border-radius:12px;
    box-shadow:none;
    white-space:nowrap;
}

.inputEntry{
    background:#0f172a;
    border:1px solid rgba(148,163,184,.12);
    border-radius:14px;
    padding:9px 10px;
    margin-top:7px;
    font-size:13px;
}

.inputEntryTop{
    display:flex;
    justify-content:space-between;
    gap:8px;
    font-weight:900;
    color:#e2e8f0;
    margin-bottom:4px;
}

.inputEntrySub{
    color:var(--muted);
    line-height:1.35;
}

.badge700{
    display:inline-block;
    padding:2px 7px;
    border-radius:999px;
    background:rgba(239,68,68,.12);
    color:#fecaca;
    border:1px solid rgba(239,68,68,.25);
    font-size:11px;
    font-weight:950;
    margin-left:4px;
}



.goalTracker{
    background:linear-gradient(180deg, rgba(30,41,59,.92), rgba(15,23,42,.92));
    border:1px solid rgba(148,163,184,.14);
    border-radius:18px;
    padding:11px 12px;
    margin-bottom:12px;
    box-shadow:0 8px 22px rgba(0,0,0,.16);
}

.goalTop{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:#cbd5e1;
    font-weight:850;
}

.goalLevel{
    color:#fff;
    font-weight:950;
}

.goalHint{
    margin-top:5px;
    font-size:12px;
    color:var(--muted);
    line-height:1.35;
}

.goalBar{
    margin-top:9px;
    width:100%;
    height:8px;
    background:#0f172a;
    border-radius:999px;
    overflow:hidden;
    border:1px solid rgba(148,163,184,.12);
}

.goalFill{
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg, #22c55e, #eab308);
    width:0%;
}

.backupReminderBox{
    display:none;
    background:rgba(234,179,8,.12);
    color:#fde68a;
    border:1px solid rgba(234,179,8,.28);
    border-left:4px solid #eab308;
    border-radius:16px;
    padding:10px 12px;
    margin-bottom:12px;
    font-size:13px;
    font-weight:800;
    line-height:1.35;
}

.evalBadge{
    display:inline-block;
    background:rgba(34,197,94,.12);
    color:#bbf7d0;
    border:1px solid rgba(34,197,94,.22);
    border-radius:999px;
    padding:4px 9px;
    font-size:12px;
    font-weight:950;
    margin-bottom:8px;
}

.archiveCard{
    border-color:rgba(56,189,248,.20);
}

.archiveMini{
    background:#0f172a;
    border:1px solid rgba(56,189,248,.18);
    border-radius:14px;
    padding:11px;
    margin-top:8px;
}

.copyBtn{
    background:#1e293b;
    color:#dbeafe;
    border:1px solid rgba(148,163,184,.18);
    padding:11px;
    font-size:14px;
    margin-top:8px;
}

.recordCard{
    border-color:rgba(234,179,8,.20);
}

.recordGrid{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
}

.recordItem{
    background:#0f172a;
    border:1px solid rgba(148,163,184,.12);
    border-radius:14px;
    padding:10px;
}

.recordLabel{
    color:var(--muted);
    font-size:12px;
    font-weight:800;
    margin-bottom:3px;
}

.recordValue{
    font-size:15px;
    font-weight:950;
    color:#f8fafc;
}




/* ÁTLAGOK UI */
.avgQuickGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:10px;
}
.avgQuickBox{
    background:#0f172a;
    border:1px solid rgba(148,163,184,.14);
    border-radius:15px;
    padding:11px;
}
.avgQuickLabel{
    color:var(--muted);
    font-size:11px;
    font-weight:850;
    text-transform:uppercase;
    letter-spacing:.45px;
    line-height:1.25;
}
.avgQuickValue{
    margin-top:4px;
    font-size:18px;
    font-weight:950;
    color:#f8fafc;
    line-height:1.1;
}
.avgQuickValue.goodValue{
    color:#bbf7d0;
}
.avgCompactNote{
    margin-top:9px;
    font-size:12px;
    color:var(--muted);
    line-height:1.35;
    font-weight:750;
}
.atlagSectionTitle{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:8px;
}
.atlagSectionTitle .pill{
    background:rgba(34,197,94,.12);
    border:1px solid rgba(34,197,94,.18);
    color:#bbf7d0;
    border-radius:999px;
    padding:4px 8px;
    font-size:11px;
    font-weight:950;
    white-space:nowrap;
}


/* PRO UI V2.20 */
.todayDashboard{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:12px;
}
.dashCard{
    position:relative;
    overflow:hidden;
    background:linear-gradient(145deg, rgba(30,41,59,.96), rgba(15,23,42,.96));
    border:1px solid rgba(148,163,184,.14);
    border-radius:18px;
    padding:12px;
    min-height:70px;
    box-shadow:0 12px 26px rgba(0,0,0,.20);
}
.dashCard::after{
    content:"";
    position:absolute;
    right:-24px;
    top:-24px;
    width:70px;
    height:70px;
    border-radius:999px;
    background:rgba(34,197,94,.09);
}
.dashIcon{
    font-size:18px;
    margin-bottom:7px;
}
.dashLabel{
    color:var(--muted);
    font-size:11px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:.55px;
}
.dashValue{
    margin-top:4px;
    color:#fff;
    font-size:21px;
    line-height:1.05;
    font-weight:950;
    letter-spacing:-.35px;
}
.dashCard.primary{
    background:linear-gradient(145deg, rgba(20,83,45,.95), rgba(15,23,42,.98));
    border-color:rgba(34,197,94,.24);
}
.dashCard.primary .dashValue{ color:#bbf7d0; }
.proSectionLabel{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin:4px 2px 8px;
    color:#cbd5e1;
    font-size:12px;
    font-weight:950;
    text-transform:uppercase;
    letter-spacing:.6px;
}
.proTinyPill{
    background:rgba(148,163,184,.12);
    border:1px solid rgba(148,163,184,.16);
    color:#cbd5e1;
    border-radius:999px;
    padding:4px 8px;
    font-size:11px;
    font-weight:950;
    white-space:nowrap;
}
.bottomNav{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:12px;
    width:calc(100% - 24px);
    max-width:560px;
    z-index:2500;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    padding:8px;
    box-sizing:border-box;
    border-radius:24px;
    background:rgba(15,23,42,.92);
    border:1px solid rgba(148,163,184,.18);
    box-shadow:0 18px 44px rgba(0,0,0,.45);
    backdrop-filter:blur(14px);
}
.bottomNavBtn{
    min-width:0;
    padding:8px 4px 7px;
    border-radius:17px;
    background:transparent;
    color:#94a3b8;
    border:1px solid transparent;
    box-shadow:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    font-size:16px;
}
.bottomNavBtn span{
    line-height:1;
}
.bottomNavBtn small{
    font-size:10px;
    font-weight:950;
    line-height:1;
    white-space:nowrap;
}
.bottomNavBtn.active{
    background:linear-gradient(135deg, rgba(34,197,94,.22), rgba(34,197,94,.08));
    color:#bbf7d0;
    border-color:rgba(34,197,94,.24);
}
.menuPanel{
    padding-bottom:88px;
}
.proCardHeader{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:9px;
}
.proCardTitle{
    font-size:18px;
    font-weight:950;
    letter-spacing:-.25px;
}
.proCardSub{
    margin-top:3px;
    font-size:12px;
    color:var(--muted);
    font-weight:750;
    line-height:1.35;
}
.podiumGrid{
    display:grid;
    grid-template-columns:1fr 1.12fr 1fr;
    gap:8px;
    align-items:end;
    margin:10px 0 10px;
}
.podiumCard{
    background:linear-gradient(180deg, #111827, #0f172a);
    border:1px solid rgba(148,163,184,.16);
    border-radius:18px;
    padding:11px 9px;
    text-align:center;
    min-height:112px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    box-shadow:0 10px 24px rgba(0,0,0,.20);
}
.podiumCard.rank1{
    min-height:132px;
    border-color:rgba(250,204,21,.35);
    box-shadow:0 12px 28px rgba(250,204,21,.08), 0 10px 24px rgba(0,0,0,.22);
}
.podiumEmoji{
    font-size:24px;
    margin-bottom:3px;
}
.podiumName{
    font-size:14px;
    font-weight:950;
    line-height:1.15;
    word-break:break-word;
}
.podiumScore{
    margin-top:7px;
    font-size:12px;
    color:#cbd5e1;
    font-weight:900;
    line-height:1.25;
}
.podiumMeta{
    margin-top:6px;
    font-size:11px;
    color:var(--muted);
    font-weight:750;

<script>
let kartonMod = localStorage.getItem("kartonMod") === "1";
let hiddenMode = localStorage.getItem("hiddenMode") === "1";

// Supabase online verseny mód.
// Csak a publishable kulcs van itt. Secret/service_role kulcsot tilos index.html-be tenni.
const SUPABASE_URL_RAW = "https://dxbioidgrgktggtvyeqc.supabase.co/rest/v1/";
const SUPABASE_REST_URL = SUPABASE_URL_RAW.replace(/\/+$/, "").replace(/\/rest\/v1$/, "") + "/rest/v1";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_qi_D5d8T8CHZowfcukpzmQ_0ecDiDye";
let onlineSyncTimer = null;

function getTodayKey(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
}

let today = getTodayKey();

function loadJson(key, fallback){
    try{
        const saved = localStorage.getItem(key);
        return saved ? JSON.parse(saved) : fallback;
    }
    catch(e){
        localStorage.removeItem(key);
        return fallback;
    }
}

let data = loadJson("data", {});
let closedPickings = loadJson("closedPickings", []);
let vacationDays = loadJson("vacationDays", []);
let monthlyArchives = loadJson("monthlyArchives", []);
let onlineUser = loadJson("onlineUser", null);
let adminSession = loadJson("adminSession", null);
let onlineUiNotice = "";
let onlineUiNoticeType = "";
let chatRefreshTimer = null;
let chatUiNotice = "";
let chatUiNoticeType = "";

if(!data || typeof data !== "object" || Array.isArray(data)){
    data = {};
}

if(!Array.isArray(closedPickings)){
    closedPickings = [];
}

if(!Array.isArray(vacationDays)){
    vacationDays = [];
}

if(!Array.isArray(monthlyArchives)){
    monthlyArchives = [];
}

if(!onlineUser || typeof onlineUser !== "object" || !onlineUser.user_id){
    onlineUser = null;
}

if(!adminSession || typeof adminSession !== "object" || !adminSession.token){
    adminSession = null;
}

function createEmptyDay(){
    return {
        tetel:0,
        karton:0,
        suly:0,
        rendeles:0,
        hetszazas:0,
        hetszazasSzeria:0,
        hetszazasSzeriaMax:0,
        hatarido6000:null,
        hatarido6000Ido:"",
        // A fő számításban használt kartonérték.
        // Karton mód KI: becsült karton, Karton mód BE: beírt karton.
        szamoltKarton:0,
        osszegyseg:0,
        // Aktuális napi beviteli előzmény. Egy elem = egy hozzáadás / rendelés.
        bevitelek:[]
    };
}

function ensureTodayData(){
    today = getTodayKey();
    let changed = false;

    if(!data[today]){
        data[today] = createEmptyDay();
        changed = true;
    }

    if(data[today].tetel === undefined){ data[today].tetel = 0; changed = true; }
    if(data[today].karton === undefined){ data[today].karton = 0; changed = true; }
    if(data[today].suly === undefined){ data[today].suly = 0; changed = true; }
    if(data[today].rendeles === undefined){ data[today].rendeles = 0; changed = true; }
    if(data[today].hetszazas === undefined){ data[today].hetszazas = 0; changed = true; }
    if(data[today].hetszazasSzeria === undefined){ data[today].hetszazasSzeria = 0; changed = true; }
    if(data[today].hetszazasSzeriaMax === undefined){ data[today].hetszazasSzeriaMax = Number(data[today].hetszazasSzeria || 0); changed = true; }
    if(data[today].hatarido6000 === undefined){ data[today].hatarido6000 = null; changed = true; }
    if(data[today].hatarido6000Ido === undefined){ data[today].hatarido6000Ido = ""; changed = true; }
    if(data[today].szamoltKarton === undefined){
        // Régi, még V1.14 előtti aktív napi adatnál nincs külön mentett számolt karton.
        // Ha volt kézzel beírt karton, azt vesszük alapnak, különben marad a becslés.
        data[today].szamoltKarton = Number(data[today].karton || 0) > 0
            ? Number(data[today].karton || 0)
            : getBecsultKarton(data[today].tetel);
        changed = true;
    }
    if(data[today].osszegyseg === undefined){
        data[today].osszegyseg = Number(data[today].suly || 0) + Number(data[today].tetel || 0) + Number(data[today].szamoltKarton || 0);
        changed = true;
    }
    if(!Array.isArray(data[today].bevitelek)){ data[today].bevitelek = []; changed = true; }

    if(changed){
        saveData();
    }
}

ensureTodayData();

function saveData(){
    localStorage.setItem("data", JSON.stringify(data));
}

function saveClosed(){
    localStorage.setItem("closedPickings", JSON.stringify(closedPickings));
}

function saveVacationDays(){
    localStorage.setItem("vacationDays", JSON.stringify(vacationDays));
}

function saveMonthlyArchives(){
    localStorage.setItem("monthlyArchives", JSON.stringify(monthlyArchives));
}

function saveOnlineUser(user){
    onlineUser = user && user.user_id ? user : null;

    if(onlineUser){
        localStorage.setItem("onlineUser", JSON.stringify(onlineUser));
    }
    else{
        localStorage.removeItem("onlineUser");
    }
}

function fmt(n){
    return Number(n || 0).toLocaleString("hu-HU");
}

const FIZETES_SZORZO = 1.64;
const HETSZAZAS_LIMIT = 680;
const HATARIDO_SULY = 6000;
const HATARIDO_ORA = 11;
const BACKUP_REMINDER_DAYS = 7;

const SULY_MERFOLDKOVEK = [
    {key:"bronz", label:"Bronz", target:10000, emoji:"🥉"},
    {key:"ezust", label:"Ezüst", target:13000, emoji:"🥈"},
    {key:"arany", label:"Arany", target:15000, emoji:"🥇"},
    {key:"platina", label:"Platina", target:18000, emoji:"💠"},
    {key:"gyemant", label:"Gyémánt", target:20000, emoji:"💎"}
];

function fmtDecimal(n){
    return Number(n || 0).toLocaleString("hu-HU", {
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function getBecsultFizetes(osszegyseg){
    return Math.round(Number(osszegyseg || 0) * FIZETES_SZORZO);
}

function showFt(n){
    return hiddenMode ? "•••• Ft" : fmt(n) + " Ft";
}

function showRate(){
    return fmtDecimal(FIZETES_SZORZO) + " Ft / egység";
}

function showPont(n){
    return hiddenMode ? "•••• pont" : fmt(n) + " pont";
}

function getCurrentSulyLevel(suly){
    const s = Number(suly || 0);
    let level = {key:"alap", label:"Alap", target:0, emoji:"🔴"};

    SULY_MERFOLDKOVEK.forEach(function(m){
        if(s >= m.target){
            level = m;
        }
    });

    return level;
}

function getNextSulyLevel(suly){
    const s = Number(suly || 0);
    return SULY_MERFOLDKOVEK.find(function(m){
        return s < m.target;
    }) || null;
}

function getDailyEvaluation(d){
    const suly = Number((d && d.suly) || 0);
    const hetszazas = Number((d && d.hetszazas) || 0);
    const maxSzeria = Number((d && (d.hetszazasSzeriaMax || d.hetszazasSzeria)) || 0);
    const level = getCurrentSulyLevel(suly);

    let label = level.label + " nap";
    if(suly < 10000){
        label = "Alap nap";
    }

    let extra = [];
    if(hetszazas > 0){
        extra.push(fmt(hetszazas) + " db 700-as");
    }
    if(maxSzeria >= 3){
        extra.push(fmt(maxSzeria) + "-as 700-as széria");
    }

    return {
        label:level.emoji + " " + label,
        level:level,
        extra:extra.join(" · "),
        text:level.emoji + " " + label + (extra.length ? " · " + extra.join(" · ") : "")
    };
}

function renderGoalTracker(){
    const box = document.getElementById("goalTracker");
    if(!box) return;

    ensureTodayData();
    const d = data[today] || createEmptyDay();
    const suly = Number(d.suly || 0);
    const current = getCurrentSulyLevel(suly);
    const next = getNextSulyLevel(suly);
    const evalInfo = getDailyEvaluation(d);

    if(!next){
        box.innerHTML = `
            <div class="goalTop">
                <span>Mai szint</span>
                <span class="goalLevel">${current.emoji} ${current.label}</span>
            </div>
            <div class="goalHint">Gyémánt szint elérve. ${evalInfo.extra ? evalInfo.extra : "Ez már nagyon erős nap."}</div>
            <div class="goalBar"><div class="goalFill" style="width:100%"></div></div>
        `;
        return;
    }

    const prevTarget = current && current.target ? current.target : 0;
    const range = Math.max(1, Number(next.target || 0) - prevTarget);
    const rawProgress = Math.max(0, Math.min(100, Math.round(((suly - prevTarget) / range) * 100)));

    if(hiddenMode){
        box.innerHTML = `
            <div class="goalTop">
                <span>Mai szint</span>
                <span class="goalLevel">${current.emoji} ${current.label}</span>
            </div>
            <div class="goalHint">Következő szint: ${next.emoji} ${next.label}. Rejtett módban a pontos kg nem látszik.</div>
        `;
        return;
    }

    const remaining = Math.max(0, Number(next.target || 0) - suly);

    box.innerHTML = `
        <div class="goalTop">
            <span>Következő szint: <span class="goalLevel">${next.emoji} ${next.label}</span></span>
            <span>${fmt(rawProgress)}%</span>
        </div>
        <div class="goalHint">Még ${fmt(remaining)} kg kell a ${fmt(next.target)} kg-os mérföldkőhöz. Mai értékelés: ${evalInfo.text}</div>
        <div class="goalBar"><div class="goalFill" style="width:${rawProgress}%"></div></div>
    `;
}

function getDaysSince(dateString){
    if(!dateString) return null;
    const last = new Date(dateString);
    if(isNaN(last.getTime())) return null;
    const now = new Date();
    return Math.floor((now.getTime() - last.getTime()) / (1000 * 60 * 60 * 24));
}

function hasAnySavedWorkData(){
    return (Array.isArray(closedPickings) && closedPickings.length > 0) ||
        (Array.isArray(vacationDays) && vacationDays.length > 0) ||
        (Array.isArray(monthlyArchives) && monthlyArchives.length > 0) ||
        Object.keys(data || {}).some(function(key){
            const d = data[key] || {};
            return Number(d.tetel || 0) > 0 || Number(d.suly || 0) > 0 || Number(d.rendeles || 0) > 0;
        });
}

function getBackupReminderInfo(){
    if(!hasAnySavedWorkData()){
        return {needed:false, text:"Még nincs mentendő adat."};
    }

    const last = localStorage.getItem("lastBackupAt") || "";
    const lastLocal = localStorage.getItem("lastBackupAtLocal") || "";
    const days = getDaysSince(last);

    if(days === null){
        return {
            needed:true,
            text:"Még nincs biztonsági mentés. Érdemes most kimenteni az adatokat fájlba."
        };
    }

    if(days >= BACKUP_REMINDER_DAYS){
        return {
            needed:true,
            text:"Már " + fmt(days) + " napja nem készült biztonsági mentés. Utolsó mentés: " + (lastLocal || last)
        };
    }

    return {
        needed:false,
        text:"Utolsó biztonsági mentés: " + (lastLocal || last)
    };
}

function renderBackupReminderBox(){
    const box = document.getElementById("backupReminderBox");
    if(!box) return;

    const info = getBackupReminderInfo();
    if(!info.needed){
        box.style.display = "none";
        box.innerHTML = "";
        return;
    }

    box.style.display = "block";
    box.innerHTML = "💾 " + info.text;
}

function isBeforeOrAtDeadline(){
    const now = new Date();
    return now.getHours() < HATARIDO_ORA || (now.getHours() === HATARIDO_ORA && now.getMinutes() === 0);
}

function getTimeShort(){
    const now = new Date();
    return now.toLocaleTimeString("hu-HU", {
        hour:"2-digit",
        minute:"2-digit"
    });
}

function updateHatarido6000Status(){
    const d = data[today];
    if(!d) return;

    if((d.hatarido6000 === null || d.hatarido6000 === undefined) && Number(d.suly || 0) >= HATARIDO_SULY){
        d.hatarido6000 = isBeforeOrAtDeadline();
        d.hatarido6000Ido = getTimeShort();
    }
}

function getSulyPont(suly){
    const s = Number(suly || 0);

    if(s >= 15000) return 10;
    if(s >= 13000) return 8;
    if(s >= 10000) return 5;

    return 0;
}

function getOsszegysegPont(osszegyseg){
    const o = Number(osszegyseg || 0);

    if(o < 15000) return 0;

    return Math.floor((o - 15000) / 1000) + 1;
}

function getHataridoPontInfo(d, isCurrentDay){
    const suly = Number(d.suly || 0);

    if(d.hatarido6000 === true || d.hatarido6000 === "true"){
        return {
            pont:5,
            label:"Megvolt 11:00-ig"
        };
    }

    if(d.hatarido6000 === false || d.hatarido6000 === "false"){
        return {
            pont:3,
            label:"Nem volt meg 11:00-ig"
        };
    }

    if(isCurrentDay && isBeforeOrAtDeadline() && suly < HATARIDO_SULY){
        return {
            pont:0,
            label:"Függőben 11:00-ig"
        };
    }

    if(isCurrentDay && isBeforeOrAtDeadline() && suly >= HATARIDO_SULY){
        return {
            pont:5,
            label:"Megvolt 11:00-ig"
        };
    }

    return {
        pont:3,
        label:"Nem volt meg 11:00-ig"
    };
}

function getPontBreakdown(d, isCurrentDay){
    const tetel = Number(d.tetel || 0);
    const suly = Number(d.suly || 0);
    const osszegyseg = d.osszegyseg !== undefined
        ? Number(d.osszegyseg || 0)
        : getOsszegyseg(tetel, suly);
    const hetszazas = Number(d.hetszazas || 0);
    const maxSzeria = Number(d.hetszazasSzeriaMax || d.hetszazasSzeria || 0);
    const hatarido = getHataridoPontInfo(d, isCurrentDay);
    const sulyPont = getSulyPont(suly);
    const hetszazasPont = hetszazas;
    const szeriaPont = maxSzeria >= 3 ? 3 : 0;
    const osszegysegPont = getOsszegysegPont(osszegyseg);
    const total = hatarido.pont + sulyPont + hetszazasPont + szeriaPont + osszegysegPont;

    return {
        total:total,
        hataridoPont:hatarido.pont,
        hataridoLabel:hatarido.label,
        sulyPont:sulyPont,
        hetszazasPont:hetszazasPont,
        szeriaPont:szeriaPont,
        osszegysegPont:osszegysegPont,
        osszegyseg:osszegyseg,
        maxSzeria:maxSzeria
    };
}

function hiddenText(suffix){

function showNumber(n){

function showKg(n){

function showApprox(n){
    return hiddenMode ? "~••••" : "~" + fmt(n);
}

function getBecsultKarton(tetel){
    // 1000 tétel ≈ 2000 karton, tehát 1 tételre kb. 2 karton jut.
    return Math.round(Number(tetel || 0) * 2);
}

function getSzamoltKarton(tetel, karton, beirtKartonnal){
    // Karton mód BE: a beírt karton számít.
    // Karton mód KI: marad az eddigi becslés, tétel × 2.
    if(beirtKartonnal){
        return Number(karton || 0);
    }

    return getBecsultKarton(tetel);
}

function getOsszegyseg(tetel, suly, karton, beirtKartonnal){
    const t = Number(tetel || 0);
    const s = Number(suly || 0);
    const szamoltKarton = getSzamoltKarton(t, karton, beirtKartonnal === true);

    return s + t + szamoltKarton;
}

function getDaySzamoltKarton(d){
    if(d && d.szamoltKarton !== undefined){
        return Number(d.szamoltKarton || 0);
    }

    if(d && Number(d.karton || 0) > 0){
        return Number(d.karton || 0);
    }

    return getBecsultKarton(d ? d.tetel : 0);
}

function getDayOsszegyseg(d){
    if(d && d.osszegyseg !== undefined){
        return Number(d.osszegyseg || 0);
    }

    return Number((d && d.suly) || 0) + Number((d && d.tetel) || 0) + getDaySzamoltKarton(d);
}

function getRecordSzamoltKarton(r){
    if(r && r.szamoltKarton !== undefined){
        return Number(r.szamoltKarton || 0);
    }

    // A régebbi rekordokban ez a mező még becsültKartonnak hívódott.
    if(r && r.becsultKarton !== undefined){
        return Number(r.becsultKarton || 0);
    }

    if(r && (r.kartonSzamitas === "beirt" || r.kartonMod === true)){
        return Number(r.karton || 0);
    }

    return getBecsultKarton(r ? r.tetel : 0);
}

function getRecordOsszegyseg(r){
    if(r && r.osszegyseg !== undefined){
        return Number(r.osszegyseg || 0);
    }

    return Number((r && r.suly) || 0) + Number((r && r.tetel) || 0) + getRecordSzamoltKarton(r);
}

// régi név kompatibilitás miatt
function getEgyseg(tetel, suly){

}

function undoLastInput(){
    ensureTodayData();
    const entries = getTodayInputs();

    if(entries.length === 0){
        alert("Nincs visszavonható hozzáadás.");
        return;
    }

    const last = entries[entries.length - 1];
    const msg = hiddenMode
        ? "Biztosan visszavonod az utolsó hozzáadást?"
        : "Biztosan visszavonod az utolsó hozzáadást?\n\n" +
          "Tétel: " + fmt(last.tetel) + "\n" +
          "Súly: " + fmt(last.suly) + " kg\n" +
          "~Összegység: " + fmt(getEntryOsszegyseg(last));

    if(!confirm(msg)) return;

    entries.pop();

    const d = data[today];
    d.tetel = Math.max(0, Number(d.tetel || 0) - Number(last.tetel || 0));
    d.karton = Math.max(0, Number(d.karton || 0) - Number(last.karton || 0));
    d.suly = Math.max(0, Number(d.suly || 0) - Number(last.suly || 0));
    d.rendeles = Math.max(0, Number(d.rendeles || 0) - 1);
    d.szamoltKarton = Math.max(0, Number(d.szamoltKarton || 0) - Number(last.szamoltKarton || 0));
    d.osszegyseg = Math.max(0, Number(d.osszegyseg || 0) - getEntryOsszegyseg(last));

    if(Number(last.suly || 0) > HETSZAZAS_LIMIT){
        d.hetszazas = Math.max(0, Number(d.hetszazas || 0) - 1);
    }

    let streak = 0;
    entries.forEach(function(e){
        if(Number(e.suly || 0) > HETSZAZAS_LIMIT){
            streak++;
        }
        else{
            streak = 0;
        }
    });
    d.hetszazasSzeria = streak;

    if(Number(d.suly || 0) < HATARIDO_SULY){
        d.hatarido6000 = null;
        d.hatarido6000Ido = "";
    }

    saveData();
    render();
    refreshActiveMenu();
    scheduleOnlineLiveUpdate();
}

function add(){
    ensureTodayData();

    const tInput = document.getElementById("t");
    const kInput = document.getElementById("k");
    const sInput = document.getElementById("s");

    const t = Number(tInput.value) || 0;
    const k = Number(kInput.value) || 0;
    const s = Number(sInput.value) || 0;

    if(t === 0){
        alert("0 tétellel nem lehet hozzáadni.");
        tInput.focus();
        return;
    }

    if(t > 120){
        const biztosTetel = confirm(
            "Kurva érdekes..\n\n" +
            "Biztos ennyi tétel?\n\n" +
            (hiddenMode ? "" : t + " tétel")
        );

        if(!biztosTetel){
            tInput.focus();
            return;
        }
    }

    if(s > 750){
        const biztos = confirm(
            "Kurva érdekes..\n\n" +
            "Biztos ennyi?\n\n" +
            (hiddenMode ? "" : s + " kg")
        );

        if(!biztos){
            sInput.focus();
            return;
        }
    }

    const szamoltKarton = getSzamoltKarton(t, k, kartonMod);
    const hozzaadottOsszegyseg = s + t + szamoltKarton;

    const inputEntry = {
        id:Date.now(),
        timestamp:new Date().toISOString(),
        ido:getTimeShort(),
        tetel:t,
        karton:kartonMod ? k : 0,
        beirtKarton:k,
        kartonMod:kartonMod,
        suly:s,
        szamoltKarton:szamoltKarton,
        osszegyseg:hozzaadottOsszegyseg,
        hetszazas:s > HETSZAZAS_LIMIT
    };

    if(!Array.isArray(data[today].bevitelek)){
        data[today].bevitelek = [];
    }
    data[today].bevitelek.push(inputEntry);

    data[today].tetel += t;
    data[today].karton += kartonMod ? k : 0;
    data[today].suly += s;
    data[today].szamoltKarton += szamoltKarton;
    data[today].osszegyseg += hozzaadottOsszegyseg;
    updateHatarido6000Status();

    // 1 hozzáadás = 1 kiszedett rendelés / bolt
    data[today].rendeles += 1;

    // 700-as: 680 kg feletti rendelés.
    // Ha több ilyen jön egymás után, a felső súlysáv tűz ikonnal jelez.
    if(s > HETSZAZAS_LIMIT){
        data[today].hetszazas += 1;
        data[today].hetszazasSzeria += 1;
        if(Number(data[today].hetszazasSzeria || 0) > Number(data[today].hetszazasSzeriaMax || 0)){
            data[today].hetszazasSzeriaMax = Number(data[today].hetszazasSzeria || 0);
        }
    }
    else{
        data[today].hetszazasSzeria = 0;
    }

    saveData();

    tInput.value = "";
    kInput.value = "";
    sInput.value = "";

    render();
    scheduleOnlineLiveUpdate();

    setTimeout(function(){
        tInput.focus();
    }, 100);
}

async function closePicking(){
    ensureTodayData();

    const d = data[today];

    if(d.tetel === 0 && d.karton === 0 && d.suly === 0 && d.rendeles === 0){
        alert("Nincs mit lezárni.");
        return;
    }

    if(!confirm("Biztosan le akarod zárni a szedést?")) return;

    const onlineOk = await handleOnlineSubmitBeforeClose(d);
    if(!onlineOk) return;

    const now = new Date();

    const record = {
        id: Date.now(),
        datum: today,
        ido: now.toLocaleTimeString("hu-HU", {
            hour:"2-digit",
            minute:"2-digit"
        }),
        tetel: Number(d.tetel || 0),
        karton: Number(d.karton || 0),
        suly: Number(d.suly || 0),
        rendeles: Number(d.rendeles || 0),
        hetszazas: Number(d.hetszazas || 0),
        hetszazasSzeriaMax: Number(d.hetszazasSzeriaMax || d.hetszazasSzeria || 0),
        hatarido6000: d.hatarido6000 === true,
        hatarido6000Ido: d.hatarido6000Ido || "",
        kartonSzamitas: Number(d.karton || 0) > 0 ? "beirt_vagy_vegyes" : "becsult",
        szamoltKarton: getDaySzamoltKarton(d),
        // Kompatibilitás miatt a régi mezőnév is marad, de ez már az egységben használt kartonértéket jelenti.
        becsultKarton: getDaySzamoltKarton(d),
        osszegyseg: getDayOsszegyseg(d),
        bevitelek: Array.isArray(d.bevitelek) ? d.bevitelek.slice() : []
    };

    closedPickings.push(record);
    saveClosed();

    data[today] = createEmptyDay();
    saveData();

    document.getElementById("t").value = "";
    document.getElementById("k").value = "";
    document.getElementById("s").value = "";

    updateKartonModeUI();
    render();

    setTimeout(function(){
        document.getElementById("t").focus();
    }, 100);

    const evalInfo = getDailyEvaluation(record);

    alert(
        "Szedés lezárva!\n\n" +
        "Értékelés: " + evalInfo.text + "\n" +
        "Súly: " + showKg(record.suly) + "\n" +
        "Tétel: " + showNumber(record.tetel) + "\n" +
        "Karton: " + showNumber(record.karton) + "\n" +
        "Kiszedett rendelések: " + showNumber(record.rendeles) + "\n" +
        "700-as: " + showNumber(record.hetszazas) + "\n" +
        "Karton az egységben: " + showApprox(record.szamoltKarton) + "\n" +
        "~Összegység: " + showNumber(record.osszegyseg)
    );
}

    const v = Number(r.rendeles || 0);

    if(v > 0){
        return v;

    // régi lezárt adatoknál még nem volt rendelés-számláló
    return 1;
}

function getDayStats(){
    const map = {};

    closedPickings.forEach(function(r){
        const datum = r.datum || "Ismeretlen";

        if(!map[datum]){
            map[datum] = {
                datum:datum,
                tetel:0,
                karton:0,
                suly:0,
                rendeles:0,
                hetszazas:0,
                hetszazasSzeriaMax:0,
                hatarido6000:false,
                hatarido6000Ido:"",
                becsultKarton:0,
                osszegyseg:0,
                lezartBlokk:0
            };
        }

        const tetel = Number(r.tetel || 0);
        const karton = Number(r.karton || 0);
        const suly = Number(r.suly || 0);
        const rendeles = getRendelesCount(r);
        const hetszazas = Number(r.hetszazas || 0);
        const maxSzeria = Number(r.hetszazasSzeriaMax || 0);

        map[datum].tetel += tetel;
        map[datum].karton += karton;
        map[datum].suly += suly;
        map[datum].rendeles += rendeles;
        map[datum].hetszazas += hetszazas;
        if(maxSzeria > map[datum].hetszazasSzeriaMax){
            map[datum].hetszazasSzeriaMax = maxSzeria;
        }
        if(r.hatarido6000 === true || r.hatarido6000 === "true"){
            map[datum].hatarido6000 = true;
            map[datum].hatarido6000Ido = r.hatarido6000Ido || map[datum].hatarido6000Ido;
        }
        map[datum].becsultKarton += getRecordSzamoltKarton(r);
        map[datum].osszegyseg += getRecordOsszegyseg(r);
        map[datum].lezartBlokk++;
    });

    return Object.values(map).sort(function(a,b){
        return b.datum.localeCompare(a.datum);
    });
}

function getMonthLabel(monthKey){
    const parts = String(monthKey || "").split("-");
    const year = parts[0] || "";
    const month = Number(parts[1] || 0);

    const names = [
        "január",
        "február",
        "március",
        "április",
        "május",
        "június",
        "július",
        "augusztus",
        "szeptember",
        "október",
        "november",
        "december"
    ];

    if(!year || !month || !names[month - 1]){
        return monthKey || "Ismeretlen hónap";
    }

    return year + " " + names[month - 1];
}

    if(datum !== getTodayKey()) return false;

    return Number(d.tetel || 0) > 0 || Number(d.suly || 0) > 0 || Number(d.rendeles || 0) > 0 || Number(d.karton || 0) > 0;
}

function getWorkdayAveragePayForMonth(datum, days){
    const monthKey = String(datum || "").slice(0,7);
    const monthDays = days.filter(function(d){
        return String(d.datum || "").slice(0,7) === monthKey;
    });

    if(monthDays.length > 0){
        const monthTotal = monthDays.reduce(function(sum,d){
            return sum + getBecsultFizetes(d.osszegyseg);
        }, 0);

        return Math.round(monthTotal / monthDays.length);
    }

    if(days.length > 0){
        const total = days.reduce(function(sum,d){
            return sum + getBecsultFizetes(d.osszegyseg);
        }, 0);

        return Math.round(total / days.length);
    }

    return 0;
}

function addVacationDay(){
    const input = document.getElementById("vacationDate");
    const datum = input && input.value ? input.value : getTodayKey();

    if(!/^\d{4}-\d{2}-\d{2}$/.test(datum)){
        alert("Válassz ki egy érvényes dátumot.");
        return;
    }

    if(getVacationDays().some(function(v){ return v.datum === datum; })){
        alert("Ez a nap már szabadságként rögzítve van.");
        return;
    }

    if(hasClosedDataForDate(datum)){
        alert("Erre a napra már van lezárt szedés. Előbb töröld azt az Előzményekből, ha szabadságként akarod rögzíteni.");
        return;
    }

    if(hasActiveDataForDate(datum)){
        alert("Erre a napra van aktív, le nem zárt adat. Előbb zárd le vagy töröld, utána rögzíts szabadságot.");
        return;
    }

    if(!confirm("Biztosan szabadságként rögzíted ezt a napot?\n\n" + datum)) return;

    vacationDays.push({
        id:Date.now(),
        datum:datum,
        createdAt:new Date().toISOString()
    });

    saveVacationDays();
    refreshActiveMenu();
    alert("Szabadság nap rögzítve.");
}

function deleteVacationDay(id){
    const numericId = Number(id || 0);
    const item = getVacationDays().find(function(v){
        return Number(v.id || 0) === numericId;
    });

    if(!item){
        alert("Nem találom ezt a szabadság napot.");
        return;
    }

    if(!confirm("Biztosan törlöd ezt a szabadság napot?\n\n" + item.datum)) return;

    vacationDays = vacationDays.filter(function(v){
        return Number(v.id || 0) !== numericId;
    });

    saveVacationDays();
    refreshActiveMenu();
    alert("Szabadság nap törölve.");
}

function getRecordData(days, months){
    if(!days.length){
        return null;
    }

    function dayEgyseg(d){
        return Number((d && d.tetel) || 0) + Number((d && d.suly) || 0);
    }

    const bestDay = days.reduce(function(best,d){ return dayEgyseg(d) > dayEgyseg(best) ? d : best; }, days[0]);
    const worstDay = days.reduce(function(worst,d){ return dayEgyseg(d) < dayEgyseg(worst) ? d : worst; }, days[0]);
    const bestSulyDay = days.reduce(function(best,d){ return d.suly > best.suly ? d : best; }, days[0]);
    const bestTetelDay = days.reduce(function(best,d){ return d.tetel > best.tetel ? d : best; }, days[0]);

function getArchivableMonthKeys(){
    const keys = {};

    function addMonth(value){
        const monthKey = String(value || "").slice(0,7);
        if(/^\d{4}-\d{2}$/.test(monthKey)){
            keys[monthKey] = true;
        }
    }

    getDayStats().forEach(function(d){
        addMonth(d.datum);
    });

    getVacationDays().forEach(function(v){
        addMonth(v.datum);
    });

    if(Array.isArray(monthlyArchives)){
        monthlyArchives.forEach(function(a){
            addMonth(a.honap);
        });
    }

    // Az aktuális hónap mindig választható, hogy hónap végén gyorsan menthető legyen.
    addMonth(today);

    return Object.keys(keys).sort(function(a,b){
        return b.localeCompare(a);
    });
}

function renderArchiveMonthOptions(){
    const months = getArchivableMonthKeys();

    return months.map(function(monthKey){
        const archived = Array.isArray(monthlyArchives) && monthlyArchives.some(function(a){

        const current = monthKey === today.slice(0,7);

        let label = getMonthLabel(monthKey);
        if(current){
            label += " - aktuális";
        }
        label += archived ? " - archiválva" : " - nincs archiválva";

        return `<option value="${monthKey}">${label}</option>`;
    }).join("");
}

function archiveMonth(monthKey){
    if(!/^\d{4}-\d{2}$/.test(String(monthKey || ""))){
        alert("Hibás hónap választás.");
        return;
    }

    const summary = getMonthSummaryData(monthKey);
    const existing = monthlyArchives.find(function(a){ return a.honap === monthKey; });
    const isCurrentMonth = monthKey === today.slice(0,7);

    const active = data[today] || createEmptyDay();
    const activeHasData = isCurrentMonth && hasAnyDayData(active);
    const hasSavedData =
        Number(summary.napok || 0) > 0 ||
        Number(summary.szabadsag || 0) > 0 ||
        Number(summary.suly || 0) > 0 ||
        Number(summary.tetel || 0) > 0 ||
        Number(summary.osszegyseg || 0) > 0 ||
        Number(summary.osszesFizetes || 0) > 0;

    if(!hasSavedData){
        let noDataMsg = "Ehhez a hónaphoz még nincs lezárt munkanap vagy szabadság:\n\n" + summary.label;
        if(activeHasData){
            noDataMsg += "\n\nA mai nyitott adat még nincs lezárva, ezért nincs benne az archívumban. Előbb zárd le a napot.";
        }
        alert(noDataMsg);
        return;
    }

    let msg = "Biztosan archiválod ezt a hónapot?\n\n" + getMonthSummaryText(monthKey);

    if(activeHasData){
        msg += "\n\nFigyelem: a mai nyitott, még le nem zárt adat nincs benne az archívumban. Előbb zárd le a napot, ha azt is menteni akarod.";
    }

    if(existing){
        msg += "\n\nEhhez a hónaphoz már van archívum. Az új archívum felülírja a régit.";
    }

    if(!confirm(msg)) return;

    const archive = {
        id: existing && existing.id ? existing.id : Date.now(),
        createdAt: existing && existing.createdAt ? existing.createdAt : new Date().toISOString(),
        createdAtLocal: existing && existing.createdAtLocal ? existing.createdAtLocal : new Date().toLocaleString("hu-HU"),
        updatedAt:new Date().toISOString(),
        updatedAtLocal:new Date().toLocaleString("hu-HU"),
        honap:monthKey,
        label:summary.label,
        summary:summary
    };

    monthlyArchives = monthlyArchives.filter(function(a){ return a.honap !== monthKey; });
    monthlyArchives.push(archive);
    monthlyArchives.sort(function(a,b){ return String(b.honap).localeCompare(String(a.honap)); });
    saveMonthlyArchives();
    refreshActiveMenu();
    alert("Havi archívum mentve: " + summary.label);
}

function deleteMonthlyArchive(id){
    const item = monthlyArchives.find(function(a){ return Number(a.id || 0) === Number(id || 0); });
    if(!item) return;

    if(!confirm("Törlöd ezt a havi archívumot?\n\n" + (item.label || item.honap || ""))) return;

    monthlyArchives = monthlyArchives.filter(function(a){ return Number(a.id || 0) !== Number(id || 0); });
    saveMonthlyArchives();
    refreshActiveMenu();
    alert("Havi archívum törölve.");
}

async function supabaseRpc(fn, payload){
    const res = await fetch(SUPABASE_REST_URL + "/rpc/" + fn, {
        method:"POST",
        headers:{
            "apikey":SUPABASE_PUBLISHABLE_KEY,
            "Authorization":"Bearer " + SUPABASE_PUBLISHABLE_KEY,
            "Content-Type":"application/json"
        },
        body:JSON.stringify(payload || {})
    });

    let data = null;
    const text = await res.text();

    try{
        data = text ? JSON.parse(text) : null;
    }
    catch(e){
        data = text;
    }

    if(!res.ok){
        const msg = data && data.message ? data.message : (typeof data === "string" ? data : "Online hiba.");
        throw new Error(msg);
    }

    return data;
}

function getCurrentOnlinePayload(){

    };
}

function scheduleOnlineLiveUpdate(){
    if(!onlineUser || !onlineUser.user_id) return;

    clearTimeout(onlineSyncTimer);
    onlineSyncTimer = setTimeout(function(){
        updateOnlineLive(true);
    }, 900);
}

async function updateOnlineLive(silent){
    if(!onlineUser || !onlineUser.user_id) return false;

    try{
        const result = await supabaseRpc("sv_update_live", getCurrentOnlinePayload());

        if(result && result.ok === false){
            throw new Error(result.error || "Az online élő állás frissítése nem sikerült.");
        }

        localStorage.setItem("lastOnlineSyncAt", new Date().toISOString());
        localStorage.removeItem("lastOnlineSyncError");

        if(!silent){
            setOnlineMessage("Élő állás frissítve", "ok");
            refreshOnlineBoards();
        }

        return true;
    }
    catch(e){
        localStorage.setItem("lastOnlineSyncError", e.message || "Online hiba");

        if(!silent){
            setOnlineMessage("Online hiba: " + (e.message || "nem sikerült frissíteni"), "bad");
        }

        return false;
    }
}

const ADMIN_BADGE_NAMES = ["balázs", "balazs", "horváth balázs", "horvath balazs"];

function normalizeNameForCompare(name){
    return String(name || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
}

function isPublicAdminName(name){
    const normalized = normalizeNameForCompare(name);
    return ADMIN_BADGE_NAMES.some(function(adminName){
        return normalizeNameForCompare(adminName) === normalized;
    });
}

function isAdminRow(r){
    return Boolean(r && (r.is_admin === true || r.is_admin === "true"));

function getRankClass(rank){
    if(Number(rank) === 1) return "medalGold";
    if(Number(rank) === 2) return "medalSilver";
    if(Number(rank) === 3) return "medalBronze";
    return "";
}

function getMonthlyScore(r){
    if(r && r.total_score !== undefined && r.total_score !== null){
        return Number(r.total_score || 0);
    }

    return Number((r && r.total_tetel) || 0) + Number((r && r.total_suly) || 0);
}

function getOnlineRowScore(r, type){
    if(type === "monthly") return getMonthlyScore(r);
    return Number((r && r.tetel) || 0) + Number((r && r.suly) || 0);
}

function getOnlineMeta(r, type){
    const visible = r && r.numbers_visible !== false;

    if(type === "live" && !visible){
        return "Számok 11:00-ig rejtve · utolsó frissítés: " + formatOnlineTime(r.updated_at);
    }

        return "Egység: " + fmt(getMonthlyScore(r)) + " · " + fmt(r.total_tetel) + " tétel · " + fmt(r.total_suly) + " kg · " + fmt(r.days_count) + " nap · 700-as: " + fmt(r.total_seven_hundreds);

}

function getOnlineShortScore(r, type){
    if(type === "live" && r && r.numbers_visible === false) return "Rejtve";
    return fmt(getOnlineRowScore(r, type)) + " egység";
}

function renderOnlineRows(rows, type){
    if(!Array.isArray(rows) || rows.length === 0){
        return `<div class="empty">Még nincs online adat.</div>`;
    }

    const top = rows.filter(function(r){ return Number(r.helyezes || 0) <= 3; });
    const rest = rows.filter(function(r){ return Number(r.helyezes || 0) > 3; });

    const rank1 = top.find(function(r){ return Number(r.helyezes || 0) === 1; });
    const rank2 = top.find(function(r){ return Number(r.helyezes || 0) === 2; });
    const rank3 = top.find(function(r){ return Number(r.helyezes || 0) === 3; });
    const podiumOrder = [rank2, rank1, rank3].filter(Boolean);

    let html = "";

    if(podiumOrder.length){
        html += `<div class="podiumGrid">${podiumOrder.map(function(r){ return renderPodiumCard(r, type); }).join("")}</div>`;
    }

    if(rest.length){
        html += `<div class="rankList">${rest.map(function(r){ return renderOnlineListRow(r, type); }).join("")}</div>`;
    }

    if(!rest.length && podiumOrder.length < rows.length){
        const shownIds = podiumOrder.map(function(r){ return String(r.name || "") + String(r.helyezes || ""); });
        const missing = rows.filter(function(r){ return shownIds.indexOf(String(r.name || "") + String(r.helyezes || "")) === -1; });
        html += missing.map(function(r){ return renderOnlineListRow(r, type); }).join("");
    }

    return html;
}

function formatOnlineTime(value){
    if(!value) return "ismeretlen";

    try{
        return new Date(value).toLocaleTimeString("hu-HU", {hour:"2-digit", minute:"2-digit"});
    }
    catch(e){
        return "ismeretlen";
    }
}

function escapeHtml(str){
    return String(str || "").replace(/[&<>'"]/g, function(ch){
        return {
            "&":"&amp;",
            "<":"&lt;",
            ">":"&gt;",
            "'":"&#39;",
            '"':"&quot;"
        }[ch];
    });
}

async function sendChatMessage(){
    const input = document.getElementById("chatInput");
    if(!input) return;

    const msg = input.value.trim();

    if(!onlineUser || !onlineUser.user_id){
        setChatMessage("Chathez online belépés szükséges.", "bad");
        return;
    }

    if(msg.length < 1){
        setChatMessage("Írj be egy üzenetet.", "warn");
        return;
    }

    if(msg.length > 200){
        setChatMessage("Maximum 200 karakter lehet.", "bad");
        return;
    }

    try{
        setChatMessage("Küldés...", "warn");
        const result = await supabaseRpc("sv_chat_send", {p_user_id:onlineUser.user_id, p_message:msg});

        if(result && result.ok === false){
            throw new Error(result.error || "Üzenet küldése nem sikerült.");
        }

        input.value = "";
        updateChatCounter();
        setChatMessage("Elküldve.", "ok");
        await refreshChatMessages(true);
    }
    catch(e){
        setChatMessage(e.message || "Üzenet küldése nem sikerült.", "bad");
    }
}

function saveAdminSession(session){
    adminSession = session && session.token ? session : null;

    if(adminSession){
        localStorage.setItem("adminSession", JSON.stringify(adminSession));
    }
    else{
        localStorage.removeItem("adminSession");
    }
}

function getAdminToken(){
    return adminSession && adminSession.token ? adminSession.token : null;

function getDefaultAdminDate(){

function getDefaultAdminMonth(){

async function adminLogin(){
    const nameEl = document.getElementById("adminName");
    const pinEl = document.getElementById("adminPin");
    const username = nameEl ? nameEl.value.trim() : "";
    const pin = pinEl ? pinEl.value.trim() : "";

    if(username.length < 2){
        setAdminMessage("Add meg az admin felhasználót.", "bad");
        return;
    }

    if(!/^\d{4,8}$/.test(pin)){
        setAdminMessage("Az admin PIN 4-8 számjegy legyen.", "bad");
        return;
    }

    try{
        setAdminMessage("Admin belépés folyamatban...", "warn");
        const result = await supabaseRpc("sv_admin_login", {p_username:username, p_pin:pin});

        if(!result || result.ok === false){
            throw new Error(result && result.error ? result.error : "Admin belépés sikertelen.");
        }

        saveAdminSession({token:result.token, username:result.username, expires_at:result.expires_at});
        if(pinEl) pinEl.value = "";
        refreshActiveMenu();
    }
    catch(e){
        setAdminMessage(e.message || "Admin belépés sikertelen.", "bad");
    }
}

async function adminLogout(){
    const token = getAdminToken();

    try{
        if(token){
            await supabaseRpc("sv_admin_logout", {p_token:token});
        }
    }
    catch(e){}

    saveAdminSession(null);
    refreshActiveMenu();
}

async function refreshAdminDashboard(showMsg){
    const box = document.getElementById("adminDashboard");
    if(!box || !adminSession || !adminSession.token) return;

    box.innerHTML = `<div class="empty">Admin adatok betöltése...</div>`;

    try{
        const result = await supabaseRpc("sv_admin_get_dashboard", {
            p_token:getAdminToken(),
            p_work_date:getDefaultAdminDate(),
            p_month:getDefaultAdminMonth()
        });

        if(!result || result.ok === false){
            throw new Error(result && result.error ? result.error : "Admin adatok nem elérhetők.");
        }

        box.innerHTML = renderAdminDashboard(result);
        if(showMsg) setAdminMessage("Admin adatok frissítve.", "ok");
    }
    catch(e){
        const msg = e.message || "Admin adatok nem elérhetők.";
        box.innerHTML = `<div class="empty">Admin panel hiba:<br>${escapeHtml(msg)}</div>`;
        setAdminMessage(msg, "bad");

        if(String(msg).toLowerCase().includes("lejárt") || String(msg).toLowerCase().includes("érvénytelen")){
            saveAdminSession(null);
        }
    }
}

async function adminRpcChecked(fn, payload, fallbackMessage){
    const result = await supabaseRpc(fn, payload);

    if(result && result.ok === false){
        throw new Error(result.error || fallbackMessage || "Admin művelet nem sikerült.");
    }

    return result;
}

function formatOnlineDateTime(value){
    if(!value) return "ismeretlen";

    try{
        return new Date(value).toLocaleString("hu-HU", {month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit"});
    }
    catch(e){
        return "ismeretlen";
    }
}

async function adminUserAction(btn){
    if(!btn || !adminSession || !adminSession.token) return;

    const action = btn.dataset.action || "";
    const userId = btn.dataset.userId || "";
    const name = btn.dataset.name || "Ismeretlen";

    try{
        if(action === "reset-pin"){
            const newPin = prompt("Új PIN ehhez a felhasználóhoz:\n" + name + "\n\n4-8 számjegy:");
            if(newPin === null) return;
            if(!/^\d{4,8}$/.test(newPin.trim())){
                alert("A PIN 4-8 számjegy legyen.");
                return;
            }
            await adminRpcChecked("sv_admin_update_user", {p_token:getAdminToken(), p_user_id:userId, p_name:null, p_pin:newPin.trim(), p_active:null, p_is_admin:null}, "PIN csere nem sikerült.");
            alert("PIN cserélve: " + name);
        }

        if(action === "rename"){
            const newName = prompt("Új név:", name);
            if(newName === null) return;
            if(newName.trim().length < 2){
                alert("A név legalább 2 karakter legyen.");
                return;
            }
            await adminRpcChecked("sv_admin_update_user", {p_token:getAdminToken(), p_user_id:userId, p_name:newName.trim(), p_pin:null, p_active:null, p_is_admin:null}, "Átnevezés nem sikerült.");
            alert("Felhasználó átnevezve.");
        }

        if(action === "deactivate" || action === "activate"){
            const active = action === "activate";
            if(!confirm((active ? "Engedélyezed" : "Tiltod") + " ezt a felhasználót?\n\n" + name)) return;
            await adminRpcChecked("sv_admin_update_user", {p_token:getAdminToken(), p_user_id:userId, p_name:null, p_pin:null, p_active:active, p_is_admin:null}, "Felhasználó állapotának módosítása nem sikerült.");
            alert(active ? "Felhasználó engedélyezve." : "Felhasználó tiltva.");
        }

        if(action === "admin-on" || action === "admin-off"){
            const isAdmin = action === "admin-on";
            if(!confirm((isAdmin ? "Admin jelet adsz" : "Admin jelet leveszel") + " ennél a felhasználónál?\n\n" + name)) return;
            await adminRpcChecked("sv_admin_update_user", {p_token:getAdminToken(), p_user_id:userId, p_name:null, p_pin:null, p_active:null, p_is_admin:isAdmin}, "Admin jel módosítása nem sikerült.");
            alert(isAdmin ? "Admin jel bekapcsolva." : "Admin jel levéve.");
        }

        if(action === "close-day"){
            const date = getDefaultAdminDate();
            if(!confirm("Lezárod online ezt a napot?\n\n" + name + " · " + date + "\n\nEz az élő adatokból készít lezárt napi eredményt.")) return;
            await adminRpcChecked("sv_admin_close_user_day", {p_token:getAdminToken(), p_user_id:userId, p_work_date:date}, "Admin napzárás nem sikerült.");
            alert("Nap online lezárva: " + name);
        }

        if(action === "delete-user"){
            if(!confirm("TELJES TÖRLÉS: " + name + "\n\nEz törli a usert, az élő adatait és minden lezárt eredményét. Biztos?")) return;
            const code = prompt("A törléshez írd be pontosan: TORLES");
            if(code !== "TORLES"){
                alert("Törlés megszakítva.");
                return;
            }
            await adminRpcChecked("sv_admin_delete_user", {p_token:getAdminToken(), p_user_id:userId, p_confirm:"TORLES"}, "Felhasználó törlése nem sikerült.");
            alert("Felhasználó törölve.");
        }

        if(action === "delete-live"){
            const date = getDefaultAdminDate();
            if(!confirm("Törlöd a mai/kiválasztott napi élő adatot?\n\n" + name + " · " + date)) return;
            await adminRpcChecked("sv_admin_delete_user_day", {p_token:getAdminToken(), p_user_id:userId, p_work_date:date, p_delete_live:true, p_delete_final:false}, "Élő adat törlése nem sikerült.");
            alert("Élő adat törölve.");
        }

        if(action === "delete-final"){
            const date = getDefaultAdminDate();
            if(!confirm("Törlöd a lezárt napi eredményt?\n\n" + name + " · " + date)) return;
            await adminRpcChecked("sv_admin_delete_user_day", {p_token:getAdminToken(), p_user_id:userId, p_work_date:date, p_delete_live:false, p_delete_final:true}, "Lezárt eredmény törlése nem sikerült.");
            alert("Lezárt eredmény törölve.");
        }

        refreshAdminDashboard(false);
    }
    catch(e){
        alert("Admin művelet nem sikerült:\n" + (e.message || "ismeretlen hiba"));
    }
}

function getBackupPayload(){
    ensureTodayData();

    return {
        app:"Súlyvadász",
        backupVersion:"2.3",
        exportedAt:new Date().toISOString(),
        exportedAtLocal:new Date().toLocaleString("hu-HU"),
        data:data,
        closedPickings:closedPickings,
        vacationDays:vacationDays,
        monthlyArchives:monthlyArchives,
        onlineUser:onlineUser,
        settings:{
            hiddenMode:hiddenMode,
            kartonMod:kartonMod,
            quoteDate:localStorage.getItem("quoteDate") || "",
            quoteText:localStorage.getItem("quoteText") || "",
            lastBackupAt:localStorage.getItem("lastBackupAt") || "",
            lastBackupAtLocal:localStorage.getItem("lastBackupAtLocal") || ""
        }
    };
}

function downloadBackup(){
    try{
        localStorage.setItem("lastBackupAt", new Date().toISOString());
        localStorage.setItem("lastBackupAtLocal", new Date().toLocaleString("hu-HU"));
        const payload = getBackupPayload();
        const json = JSON.stringify(payload, null, 2);
        const blob = new Blob([json], {type:"application/json"});
        const fileName = "sulyvadasz-backup-" + getTodayKey() + ".json";
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");

        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();

        setTimeout(function(){
            URL.revokeObjectURL(url);
            a.remove();
            renderBackupReminderBox();
            refreshActiveMenu();
        }, 500);
    }
    catch(e){
        alert("Nem sikerült elkészíteni a biztonsági mentést.");
    }
}

function openBackupImport(){
    const input = document.getElementById("backupFileInput");

    if(!input){
        alert("Nem találom a visszatöltő mezőt. Nyisd meg újra a Beállítások menüt.");
        return;
    }

    input.value = "";
    input.click();
}

function importBackupFromFile(input){
    const file = input && input.files ? input.files[0] : null;

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){
        try{
            const backup = JSON.parse(event.target.result);
            const restoredData = backup.data || (backup.keys ? backup.keys.data : null);
            const restoredClosed = backup.closedPickings || (backup.keys ? backup.keys.closedPickings : null);
            const restoredVacation = backup.vacationDays || (backup.keys ? backup.keys.vacationDays : []);
            const restoredArchives = backup.monthlyArchives || (backup.keys ? backup.keys.monthlyArchives : []);
            const restoredOnlineUser = backup.onlineUser || null;
            const restoredSettings = backup.settings || {};

            if(!restoredData || typeof restoredData !== "object" || Array.isArray(restoredData)){
                throw new Error("Hiányzik vagy hibás a napi adat.");
            }

            if(!Array.isArray(restoredClosed)){
                throw new Error("Hiányzik vagy hibás a lezárt szedések listája.");
            }

            if(restoredVacation && !Array.isArray(restoredVacation)){
                throw new Error("Hibás a szabadság napok listája.");
            }

            if(restoredArchives && !Array.isArray(restoredArchives)){
                throw new Error("Hibás a havi archívumok listája.");
            }

            const biztos = confirm(
                "Biztosan visszatöltöd ezt a biztonsági mentést?\n\n" +
                "Ez felülírja a telefonon lévő jelenlegi Súlyvadász adatokat.\n\n" +
                "Mentés ideje: " + (backup.exportedAtLocal || backup.exportedAt || "ismeretlen")
            );

            if(!biztos){
                input.value = "";
                return;
            }

            data = restoredData;
            closedPickings = restoredClosed;
            vacationDays = restoredVacation || [];
            monthlyArchives = restoredArchives || [];
            onlineUser = restoredOnlineUser && restoredOnlineUser.user_id ? restoredOnlineUser : null;
            hiddenMode = !!restoredSettings.hiddenMode;
            kartonMod = !!restoredSettings.kartonMod;

            today = getTodayKey();
            ensureTodayData();

            saveData();
            saveClosed();
            saveVacationDays();
            saveMonthlyArchives();

            localStorage.setItem("hiddenMode", hiddenMode ? "1" : "0");
            localStorage.setItem("kartonMod", kartonMod ? "1" : "0");
            saveOnlineUser(onlineUser);

            if(restoredSettings.quoteDate){
                localStorage.setItem("quoteDate", restoredSettings.quoteDate);
            }
            else{
                localStorage.removeItem("quoteDate");
            }

            if(restoredSettings.quoteText){
                localStorage.setItem("quoteText", restoredSettings.quoteText);
            }
            else{
                localStorage.removeItem("quoteText");
            }

            if(restoredSettings.lastBackupAt){
                localStorage.setItem("lastBackupAt", restoredSettings.lastBackupAt);
            }
            else if(backup.exportedAt){
                localStorage.setItem("lastBackupAt", backup.exportedAt);
            }
            else{
                localStorage.removeItem("lastBackupAt");
            }

            if(restoredSettings.lastBackupAtLocal){
                localStorage.setItem("lastBackupAtLocal", restoredSettings.lastBackupAtLocal);
            }
            else if(backup.exportedAtLocal){
                localStorage.setItem("lastBackupAtLocal", backup.exportedAtLocal);
            }
            else{
                localStorage.removeItem("lastBackupAtLocal");
            }

            updateHiddenModeUI();
            updateKartonModeUI();
            render();
            refreshActiveMenu();

            input.value = "";
            alert("Biztonsági mentés visszatöltve.");
        }
        catch(e){
            input.value = "";
            alert("Nem sikerült visszatölteni a fájlt. Ellenőrizd, hogy Súlyvadász backup .json fájlt választottál-e.");
        }
    };

    reader.onerror = function(){
        input.value = "";
        alert("Nem sikerült beolvasni a fájlt.");
    };

    reader.readAsText(file);
}

function refreshActiveMenu(){
    const overlay = document.getElementById("menuOverlay");

    if(overlay && overlay.style.display === "block"){
        const box = document.getElementById("menuContent");
        showMenuTab(box && box.dataset.tab ? box.dataset.tab : "beallitasok");
    }
}

function deleteClosedPicking(id){
    const numericId = Number(id || 0);

    if(!numericId){
        alert("Ezt a régi bejegyzést nem tudom külön törölni, mert nincs azonosítója.");
        return;
    }

    const record = closedPickings.find(function(r){
        return Number(r.id || 0) === numericId;
    });

    if(!record){
        alert("Nem találom ezt a lezárást.");
        return;
    }

    const biztos = confirm(
        "Biztosan törlöd ezt a lezárást a statisztikából?\n\n" +
        (record.datum || "") + " " + (record.ido || "") + "\n" +
        "Súly: " + showKg(record.suly) + "\n" +
        "Tétel: " + showNumber(record.tetel) + "\n\n" +
        "Ez csak ezt az egy bejegyzést törli."
    );

    if(!biztos) return;

    closedPickings = closedPickings.filter(function(r){
        return Number(r.id || 0) !== numericId;
    });

    saveClosed();
    refreshActiveMenu();

    alert("A kiválasztott lezárás törölve lett a statisztikából.");
}

function deleteDayData(datum){
    const count = closedPickings.filter(function(r){
        return (r.datum || "Ismeretlen") === datum;
    }).length;

    if(count === 0){
        alert("Ehhez a naphoz nincs törölhető lezárás.");
        return;
    }

    const biztos = confirm(
        "Biztosan törlöd ezt a teljes napot a statisztikából?\n\n" +
        datum + "\n" +
        "Törölt lezárások száma: " + count + "\n\n" +
        "Ez a többi napot nem bántja."
    );

    if(!biztos) return;

    closedPickings = closedPickings.filter(function(r){
        return (r.datum || "Ismeretlen") !== datum;
    });

    saveClosed();
    refreshActiveMenu();

    alert("A kiválasztott nap törölve lett a statisztikából.");
}

function deleteAllData(){
    const biztos = confirm(
        "Biztosan törölni akarod az összes eddigi adatot?\n\n" +
        "Ez törli:\n" +
        "- a lezárt szedéseket\n" +
        "- a napi adatokat\n" +
        "- az átlagokat\n" +
        "- a tesztadatokat\n" +
        "- a szabadság napokat\n" +
        "- az online felhasználói beállítást erről a telefonról\n\n" +
        "Ezt nem lehet visszavonni."
    );

    if(!biztos) return;

    const kod = prompt(
        "A végleges törléshez írd be pontosan:\n\nTORLES"
    );

    if(kod !== "TORLES"){
        alert("Törlés megszakítva.");
        return;
    }

    localStorage.removeItem("data");
    localStorage.removeItem("closedPickings");
    localStorage.removeItem("vacationDays");
    localStorage.removeItem("monthlyArchives");
    localStorage.removeItem("lastBackupAt");
    localStorage.removeItem("lastBackupAtLocal");
    localStorage.removeItem("onlineUser");
    localStorage.removeItem("lastOnlineSyncAt");
    localStorage.removeItem("lastOnlineSyncError");
    localStorage.removeItem("adminSession");

    data = {};
    closedPickings = [];
    vacationDays = [];
    monthlyArchives = [];
    onlineUser = null;
    adminSession = null;

    today = getTodayKey();
    data[today] = createEmptyDay();

    saveData();
    saveClosed();

    document.getElementById("t").value = "";
    document.getElementById("k").value = "";
    document.getElementById("s").value = "";

    updateKartonModeUI();
    render();

    if(document.getElementById("menuOverlay").style.display === "block"){
        showMenuTab("elozmenyek");
    }

    alert("Minden eddigi adat törölve.");
}
