<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Szedőcsicska V2</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<style>
body{
    margin:0;
    padding:16px;
    padding-bottom:40px;
    background:#111827;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.header{
    background:#374151;
    padding:14px;
    border-radius:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:800;
    margin-bottom:12px;
}

.menuBtn{
    width:auto;
    padding:10px 14px;
    font-size:14px;
    border-radius:12px;
    background:#111827;
    color:white;
}

.card{
    background:#1f2937;
    border-radius:14px;
    padding:12px;
    margin-bottom:10px;
}

input{
    width:100%;
    box-sizing:border-box;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:28px;
    background:#374151;
    color:white;
    font-weight:700;
}

button{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:18px;
    font-weight:800;
}

.grayBtn{
    background:#4b5563;
    color:white;
    margin-bottom:10px;
}

.closeDayBtn{
    background:#7f1d1d;
    color:white;
    margin-top:12px;
    padding:12px;
    font-size:15px;
    font-weight:800;
    border:1px solid #ef4444;
}

.dangerBtn{
    background:#7f1d1d;
    color:white;
    margin-top:16px;
    padding:14px;
    font-size:15px;
    font-weight:800;
    border:1px solid #ef4444;
}

.stat{
    background:#1f2937;
    padding:14px;
    border-radius:14px;
    margin-top:10px;
    margin-bottom:10px;
}

.row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    font-size:18px;
    margin:6px 0;
}

.creatorFooter{
    text-align:center;
    font-size:12px;
    opacity:0.55;
    margin-top:18px;
    margin-bottom:10px;
    color:#d1d5db;
}
    
.small{
    font-size:13px;
    opacity:0.7;
}

.weightBanner{
    position:sticky;
    top:0;
    z-index:999;
    background:#dc2626;
    color:white;
    text-align:center;
    font-size:18px;
    font-weight:800;
    padding:10px;
    border-radius:12px;
    margin-bottom:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
}

.quoteBox{
    display:none;
    background:#1f2937;
    color:#d1d5db;
    border-left:4px solid #22c55e;
    border-radius:12px;
    padding:10px 12px;
    margin-bottom:12px;
    font-size:13px;
    font-weight:600;
    line-height:1.35;
    opacity:0.95;
}

#kartonBox{
    display:none;
}

/* MENU */
.menuOverlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    z-index:2000;
    padding:14px;
    box-sizing:border-box;
}

.menuPanel{
    background:#111827;
    border:1px solid #374151;
    border-radius:18px;
    height:calc(100vh - 28px);
    height:calc(100dvh - 28px);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
    padding:14px;
    box-sizing:border-box;
}

.menuHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.menuTitle{
    font-size:22px;
    font-weight:900;
}

.menuClose{
    width:auto;
    padding:10px 14px;
    background:#374151;
    color:white;
    font-size:16px;
}

.menuTabs{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-bottom:12px;
}

.menuTab{
    padding:12px 8px;
    font-size:14px;
    background:#374151;
    color:white;
}

.menuTab.active{
    background:#22c55e;
    color:#000;
}

.menuCard{
    background:#1f2937;
    border-radius:14px;
    padding:12px;
    margin-bottom:10px;
}

.menuCardTitle{
    font-size:16px;
    font-weight:900;
    margin-bottom:6px;
}

.menuLine{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin:5px 0;
    font-size:15px;
}

.good{
    color:#22c55e;
    font-weight:900;
}

.bad{
    color:#ef4444;
    font-weight:900;
}

.empty{
    opacity:.75;
    text-align:center;
    padding:18px;
}

.historySummary{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    list-style:none;
    cursor:pointer;
}

.historySummary::-webkit-details-marker{
    display:none;
}

.historyTotal{
    font-size:18px;
    font-weight:900;
    color:#22c55e;
    white-space:nowrap;
}

.historyDetails{
    margin-top:12px;
    padding-top:10px;
    border-top:1px solid #374151;
}

.historyPick{
    background:#111827;
    border-radius:12px;
    padding:10px;
    margin-top:8px;
    font-size:14px;
}


.privacyBtn{
    background:#0f172a;
    color:#e5e7eb;
    margin-bottom:10px;
    border:1px solid #4b5563;
}

.privacyBtn.active{
    background:#14532d;
    color:#fff;
    border-color:#22c55e;
}

.privacyHint{
    text-align:center;
    font-size:12px;
    opacity:.7;
    margin-top:-4px;
    margin-bottom:10px;
}


.privacyMode #menuContent .menuLine b,
.privacyMode #menuContent .historyTotal,
.privacyMode #menuContent .historySummary .small,
.privacyMode #menuContent .historyPick div{
    filter:blur(7px);
    user-select:none;
}

.deleteMiniBtn{
    background:#7f1d1d;
    color:white;
    border:1px solid #ef4444;
    padding:9px 10px;
    font-size:13px;
    border-radius:10px;
    margin-top:8px;
}

.deleteDayBtn{
    background:#451a1a;
    color:#fecaca;
    border:1px solid #7f1d1d;
    padding:10px;
    font-size:13px;
    border-radius:10px;
    margin-top:12px;
}

</style>
</head>

<body>

<div class="header">
    <div>📦 Szedőcsicska V2</div>
    <button class="menuBtn" onclick="openMenu()">☰ Menü</button>
</div>

<div id="weightBanner" class="weightBanner">
    0 kg
</div>

<div id="quoteBox" class="quoteBox">
    Mai bölcsesség...
</div>

<button class="privacyBtn" onclick="toggleHiddenMode()" id="privacyBtn">
🙈 Rejtett mód: KI
</button>

<div id="privacyHint" class="privacyHint" style="display:none;">
A statisztikai számok el vannak rejtve, de amit beírsz, azt látod.
</div>

<button class="grayBtn" onclick="toggleKartonMod()" id="pbtn">
Karton mód
</button>

<div class="card">
    <div class="small">TÉTEL</div>
    <input id="t" type="tel" inputmode="numeric">
</div>

<div class="card" id="kartonBox">
    <div class="small">KARTON</div>
    <input id="k" type="tel" inputmode="numeric">
</div>

<div class="card">
    <div class="small">SÚLY</div>
    <input id="s" type="tel" inputmode="numeric">
</div>

<div class="stat">
    <div class="row">Tétel <span id="st">0</span></div>
    <div class="row">Karton <span id="sk">0</span></div>
    <div class="row">Kiszedett rendelések <span id="sr">0</span></div>
    <div class="row">~Összegység <span id="sum">0</span></div>
</div>

<button class="grayBtn" onclick="add()">➕ HOZZÁADÁS</button>

<button class="closeDayBtn" onclick="closePicking()">
📅 Szedés lezárása
</button>

<div class="creatorFooter">
    © 2026 Horváth Balázs · Szedőcsicska V2 · All rights reserved.
</div>

<!-- MENU -->
<div id="menuOverlay" class="menuOverlay">
    <div class="menuPanel">

        <div class="menuHeader">
            <div class="menuTitle">☰ Menü</div>
            <button class="menuClose" onclick="closeMenu()">✕</button>
        </div>

        <div class="menuTabs">
            <button class="menuTab active" data-tab="elozmenyek" onclick="showMenuTab('elozmenyek')">
                Előzmények
            </button>

            <button class="menuTab" data-tab="atlagok" onclick="showMenuTab('atlagok')">
                Átlagok
            </button>

            <button class="menuTab" data-tab="changelog" onclick="showMenuTab('changelog')">
                Changelog
            </button>
        </div>

        <div id="menuContent"></div>

        <div id="dangerZone">
            <button class="dangerBtn" onclick="deleteAllData()">
                🗑️ Összes adat törlése
            </button>
        </div>

    </div>
</div>

<script>
let kartonMod = false;
let hiddenMode = localStorage.getItem("hiddenMode") === "1";

function getTodayKey(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
}

let today = getTodayKey();

function loadJson(key, fallback){
    try{
        const saved = localStorage.getItem(key);
        return saved ? JSON.parse(saved) : fallback;
    }
    catch(e){
        localStorage.removeItem(key);
        return fallback;
    }
}

let data = loadJson("data", {});
let closedPickings = loadJson("closedPickings", []);

if(!data || typeof data !== "object" || Array.isArray(data)){
    data = {};
}

if(!Array.isArray(closedPickings)){
    closedPickings = [];
}

function createEmptyDay(){
    return {
        tetel:0,
        karton:0,
        suly:0,
        rendeles:0
    };
}

function ensureTodayData(){
    today = getTodayKey();
    let changed = false;

    if(!data[today]){
        data[today] = createEmptyDay();
        changed = true;
    }

    if(data[today].tetel === undefined){ data[today].tetel = 0; changed = true; }
    if(data[today].karton === undefined){ data[today].karton = 0; changed = true; }
    if(data[today].suly === undefined){ data[today].suly = 0; changed = true; }
    if(data[today].rendeles === undefined){ data[today].rendeles = 0; changed = true; }

    if(changed){
        saveData();
    }
}

ensureTodayData();

function saveData(){
    localStorage.setItem("data", JSON.stringify(data));
}

function saveClosed(){
    localStorage.setItem("closedPickings", JSON.stringify(closedPickings));
}

function fmt(n){
    return Number(n || 0).toLocaleString("hu-HU");
}


function hiddenText(suffix){
    return "••••" + (suffix || "");
}

function showNumber(n){
    return hiddenMode ? "••••" : fmt(n);
}

function showKg(n){
    return hiddenMode ? "•••• kg" : fmt(n) + " kg";
}

function showApprox(n){
    return hiddenMode ? "~••••" : "~" + fmt(n);
}

function getBecsultKarton(tetel){
    // 1000 tétel ≈ 2000 karton, tehát 1 tételre kb. 2 karton jut.
    return Math.round(Number(tetel || 0) * 2);
}

function getOsszegyseg(tetel, suly){
    const t = Number(tetel || 0);
    const s = Number(suly || 0);
    const becsultKarton = getBecsultKarton(t);

    return s + t + becsultKarton;
}

// régi név kompatibilitás miatt
function getEgyseg(tetel, suly){
    return getOsszegyseg(tetel, suly);
}

const quotes = [
    "700-as? Kurva érdekes.",
    "Kurva érdekes...",
    "Nem megy, csicska?",
    "Ne zavarj!",
    "Hagyjad, majd én szedem a szarját.",
    "Súlyos papír, szebb nap.",
    "Ez már nem szedés, ez vadászat.",
    "A kg nem hazudik, csak odaver.",
    "A raktár nem kérdez, csak kioszt.",
    "Ne nézd, szedd.",
    "Ha súlyos a papír, szebb a nap.",
    "Aki a súlyt hozza, az viszi a napot.",
    "Szedni kell, nem magyarázni.",
    "A tétel jön-megy, a kg marad.",
    "Súlyvadász üzemmód aktiválva."
];

function showDailyQuote(){
    const todayQuoteKey = getTodayKey();
    const savedQuoteDate = localStorage.getItem("quoteDate");
    const savedQuoteText = localStorage.getItem("quoteText");

    const quoteBox = document.getElementById("quoteBox");
    if(!quoteBox) return;

    if(savedQuoteDate === todayQuoteKey && savedQuoteText){
        quoteBox.innerText = savedQuoteText;
        quoteBox.style.display = "block";
        return;
    }

    const randomIndex = Math.floor(Math.random() * quotes.length);
    const todaysQuote = quotes[randomIndex];

    localStorage.setItem("quoteDate", todayQuoteKey);
    localStorage.setItem("quoteText", todaysQuote);

    quoteBox.innerText = todaysQuote;
    quoteBox.style.display = "block";
}


function updateHiddenModeUI(){
    const btn = document.getElementById("privacyBtn");
    const hint = document.getElementById("privacyHint");

    document.body.classList.toggle("privacyMode", hiddenMode);

    if(btn){
        btn.classList.toggle("active", hiddenMode);
        btn.innerText = hiddenMode ? "🙈 Rejtett mód: BE" : "👁️ Rejtett mód: KI";
    }

    if(hint){
        hint.style.display = hiddenMode ? "block" : "none";
    }
}

function toggleHiddenMode(){
    hiddenMode = !hiddenMode;
    localStorage.setItem("hiddenMode", hiddenMode ? "1" : "0");
    updateHiddenModeUI();
    render();

    const overlay = document.getElementById("menuOverlay");
    if(overlay && overlay.style.display === "block"){
        const activeTab = document.querySelector(".menuTab.active");
        showMenuTab(activeTab ? activeTab.dataset.tab : "elozmenyek");
    }
}

function toggleKartonMod(){
    kartonMod = !kartonMod;

    const box = document.getElementById("kartonBox");
    const btn = document.getElementById("pbtn");

    if(box){
        box.style.display = kartonMod ? "block" : "none";
    }

    if(btn){
        btn.innerText = kartonMod ? "Karton mód ✅" : "Karton mód";
    }
}

function togglePentek(){
    toggleKartonMod();
}

function add(){
    ensureTodayData();

    const tInput = document.getElementById("t");
    const kInput = document.getElementById("k");
    const sInput = document.getElementById("s");

    const t = Number(tInput.value) || 0;
    const k = Number(kInput.value) || 0;
    const s = Number(sInput.value) || 0;

    if(t === 0){
        alert("0 tétellel nem lehet hozzáadni.");
        tInput.focus();
        return;
    }

    if(t > 120){
        const biztosTetel = confirm(
            "Kurva érdekes..\n\n" +
            "Biztos ennyi tétel?\n\n" +
            (hiddenMode ? "" : t + " tétel")
        );

        if(!biztosTetel){
            tInput.focus();
            return;
        }
    }

    if(s > 750){
        const biztos = confirm(
            "Kurva érdekes..\n\n" +
            "Biztos ennyi?\n\n" +
            (hiddenMode ? "" : s + " kg")
        );

        if(!biztos){
            sInput.focus();
            return;
        }
    }

    data[today].tetel += t;
    data[today].karton += kartonMod ? k : 0;
    data[today].suly += s;

    // 1 hozzáadás = 1 kiszedett rendelés / bolt
    data[today].rendeles += 1;

    saveData();

    tInput.value = "";
    kInput.value = "";
    sInput.value = "";

    render();

    setTimeout(function(){
        tInput.focus();
    }, 100);
}

function render(){
    ensureTodayData();

    const d = data[today];

    const banner = document.getElementById("weightBanner");

    if(banner){
        if(hiddenMode){
            banner.innerText = "Rejtett mód";
            banner.style.background = "#374151";
            banner.style.color = "#fff";
        }
        else{
            banner.innerText = fmt(d.suly) + " kg";

            if(d.suly < 10000){
                banner.style.background = "#dc2626";
                banner.style.color = "#fff";
            }
            else if(d.suly < 13000){
                banner.style.background = "#16a34a";
                banner.style.color = "#fff";
            }
            else{
                banner.style.background = "#eab308";
                banner.style.color = "#000";
            }
        }
    }

    const stEl = document.getElementById("st");
    const skEl = document.getElementById("sk");
    const srEl = document.getElementById("sr");
    const sumEl = document.getElementById("sum");

    if(stEl) stEl.innerText = showNumber(d.tetel);
    if(skEl) skEl.innerText = showNumber(d.karton);
    if(srEl) srEl.innerText = showNumber(d.rendeles);
    if(sumEl) sumEl.innerText = showNumber(getOsszegyseg(d.tetel, d.suly));
}

function closePicking(){
    ensureTodayData();

    const d = data[today];

    if(d.tetel === 0 && d.karton === 0 && d.suly === 0 && d.rendeles === 0){
        alert("Nincs mit lezárni.");
        return;
    }

    if(!confirm("Biztosan le akarod zárni a szedést?")) return;

    const now = new Date();

    const record = {
        id: Date.now(),
        datum: today,
        ido: now.toLocaleTimeString("hu-HU", {
            hour:"2-digit",
            minute:"2-digit"
        }),
        tetel: Number(d.tetel || 0),
        karton: Number(d.karton || 0),
        suly: Number(d.suly || 0),
        rendeles: Number(d.rendeles || 0),
        becsultKarton: getBecsultKarton(d.tetel),
        osszegyseg: getOsszegyseg(d.tetel, d.suly)
    };

    closedPickings.push(record);
    saveClosed();

    data[today] = createEmptyDay();
    saveData();

    document.getElementById("t").value = "";
    document.getElementById("k").value = "";
    document.getElementById("s").value = "";

    kartonMod = false;

    const box = document.getElementById("kartonBox");
    const btn = document.getElementById("pbtn");

    if(box) box.style.display = "none";
    if(btn) btn.innerText = "Karton mód";

    render();

    setTimeout(function(){
        document.getElementById("t").focus();
    }, 100);

    alert(
        "Szedés lezárva!\n\n" +
        "Súly: " + showKg(record.suly) + "\n" +
        "Tétel: " + showNumber(record.tetel) + "\n" +
        "Karton: " + showNumber(record.karton) + "\n" +
        "Kiszedett rendelések: " + showNumber(record.rendeles) + "\n" +
        "Becsült karton: " + showApprox(record.becsultKarton) + "\n" +
        "~Összegység: " + showNumber(record.osszegyseg)
    );
}

function resetDay(){
    closePicking();
}

/* ENTER FLOW */
const tEl = document.getElementById("t");
const kEl = document.getElementById("k");
const sEl = document.getElementById("s");

if(tEl){
    tEl.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            e.preventDefault();

            if(kartonMod){
                kEl.focus();
            }else{
                sEl.focus();
            }
        }
    });
}

if(kEl){
    kEl.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            e.preventDefault();
            sEl.focus();
        }
    });
}

if(sEl){
    sEl.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            e.preventDefault();
            add();
        }
    });
}

/* MENU */
function openMenu(){
    const overlay = document.getElementById("menuOverlay");

    if(overlay){
        overlay.style.display = "block";
        document.body.style.overflow = "hidden";
    }

    showMenuTab("elozmenyek");
}

function closeMenu(){
    const overlay = document.getElementById("menuOverlay");

    if(overlay){
        overlay.style.display = "none";
        document.body.style.overflow = "";
    }
}

function showMenuTab(tab){
    document.querySelectorAll(".menuTab").forEach(function(btn){
        btn.classList.remove("active");

        if(btn.dataset.tab === tab){
            btn.classList.add("active");
        }
    });

    const box = document.getElementById("menuContent");
    if(!box) return;

    if(tab === "elozmenyek"){
        box.innerHTML = renderElozmenyek();
    }

    if(tab === "atlagok"){
        box.innerHTML = renderAtlagok();
    }

    if(tab === "changelog"){
        box.innerHTML = renderChangelog();
    }

    const dangerZone = document.getElementById("dangerZone");

    if(dangerZone){
        dangerZone.style.display = tab === "changelog" ? "none" : "block";
    }
}

function getRendelesCount(r){
    const v = Number(r.rendeles || 0);

    if(v > 0){
        return v;
    }

    // régi lezárt adatoknál még nem volt rendelés-számláló
    return 1;
}

function getDayStats(){
    const map = {};

    closedPickings.forEach(function(r){
        const datum = r.datum || "Ismeretlen";

        if(!map[datum]){
            map[datum] = {
                datum:datum,
                tetel:0,
                karton:0,
                suly:0,
                rendeles:0,
                becsultKarton:0,
                osszegyseg:0,
                lezartBlokk:0
            };
        }

        const tetel = Number(r.tetel || 0);
        const karton = Number(r.karton || 0);
        const suly = Number(r.suly || 0);
        const rendeles = getRendelesCount(r);

        map[datum].tetel += tetel;
        map[datum].karton += karton;
        map[datum].suly += suly;
        map[datum].rendeles += rendeles;
        map[datum].becsultKarton += getBecsultKarton(tetel);
        map[datum].osszegyseg += getOsszegyseg(tetel, suly);
        map[datum].lezartBlokk++;
    });

    return Object.values(map).sort(function(a,b){
        return b.datum.localeCompare(a.datum);
    });
}

function renderElozmenyek(){
    const days = getDayStats();

    if(days.length === 0){
        return `<div class="empty">Még nincs lezárt adat.</div>`;
    }

    return days.map(function(d){
        const picks = closedPickings
            .filter(function(r){
                return (r.datum || "Ismeretlen") === d.datum;
            })
            .sort(function(a,b){
                return Number(b.id || 0) - Number(a.id || 0);
            });

        return `
            <details class="menuCard">
                <summary class="historySummary">
                    <div>
                        <div class="menuCardTitle">${d.datum}</div>

function getMonthLabel(monthKey){
    const parts = String(monthKey || "").split("-");
    const year = parts[0] || "";
    const month = Number(parts[1] || 0);

    const names = [
        "január",
        "február",
        "március",
        "április",
        "május",
        "június",
        "július",
        "augusztus",
        "szeptember",
        "október",
        "november",
        "december"
    ];

    if(!year || !month || !names[month - 1]){
        return monthKey || "Ismeretlen hónap";
    }

    return year + " " + names[month - 1];
}

function getMonthStats(days){
    const map = {};

    days.forEach(function(d){
        const honap = String(d.datum || "Ismeretlen").slice(0,7);

        if(!map[honap]){
            map[honap] = {
                honap:honap,
                napok:0,
                tetel:0,
                karton:0,
                suly:0,
                rendeles:0,
                becsultKarton:0,
                osszegyseg:0
            };
        }

        map[honap].napok++;
        map[honap].tetel += Number(d.tetel || 0);
        map[honap].karton += Number(d.karton || 0);
        map[honap].suly += Number(d.suly || 0);
        map[honap].rendeles += Number(d.rendeles || 0);
        map[honap].becsultKarton += Number(d.becsultKarton || 0);
        map[honap].osszegyseg += Number(d.osszegyseg || 0);
    });

    return Object.values(map).sort(function(a,b){
        return b.honap.localeCompare(a.honap);
    });
}

function deleteClosedPicking(id){
    const numericId = Number(id || 0);

    if(!numericId){
        alert("Ezt a régi bejegyzést nem tudom külön törölni, mert nincs azonosítója.");
        return;
    }

    const record = closedPickings.find(function(r){
        return Number(r.id || 0) === numericId;
    });

    if(!record){
        alert("Nem találom ezt a lezárást.");
        return;
    }

    const biztos = confirm(
        "Biztosan törlöd ezt a lezárást a statisztikából?\n\n" +
        (record.datum || "") + " " + (record.ido || "") + "\n" +
        "Súly: " + showKg(record.suly) + "\n" +
        "Tétel: " + showNumber(record.tetel) + "\n\n" +
        "Ez csak ezt az egy bejegyzést törli."
    );

    if(!biztos) return;

    closedPickings = closedPickings.filter(function(r){
        return Number(r.id || 0) !== numericId;
    });

    saveClosed();
    refreshActiveMenu();

    alert("A kiválasztott lezárás törölve lett a statisztikából.");
}

function deleteDayData(datum){
    const count = closedPickings.filter(function(r){
        return (r.datum || "Ismeretlen") === datum;
    }).length;

    if(count === 0){
        alert("Ehhez a naphoz nincs törölhető lezárás.");
        return;
    }

    const biztos = confirm(
        "Biztosan törlöd ezt a teljes napot a statisztikából?\n\n" +
        datum + "\n" +
        "Törölt lezárások száma: " + count + "\n\n" +
        "Ez a többi napot nem bántja."
    );

    if(!biztos) return;

    closedPickings = closedPickings.filter(function(r){
        return (r.datum || "Ismeretlen") !== datum;
    });

    saveClosed();
    refreshActiveMenu();

    alert("A kiválasztott nap törölve lett a statisztikából.");
}
