<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Raktár Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#581c87">

<style>

body{
    margin:0;
    padding:20px;
    padding-bottom:140px;
    background:#581c87;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.header{
    background:#7c3aed;
    padding:18px;
    border-radius:18px;
    font-size:22px;
    font-weight:800;
    text-align:center;
    margin-bottom:15px;
}

.kgBox{
    background:#6d28d9;
    border-radius:18px;
    padding:20px;
    text-align:center;
    margin-bottom:15px;
}

.kgBig{
    font-size:60px;
    font-weight:900;
}

.card{
    background:#6d28d9;
    border-radius:18px;
    padding:15px;
    margin-bottom:12px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:13px;
    opacity:0.8;
}

input{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:34px;
    background:#4c1d95;
    color:white;
    font-weight:700;
}

button{
    width:100%;
    border:none;
    border-radius:16px;
    padding:18px;
    font-size:20px;
    font-weight:900;
}

.saveBtn{
    position:fixed;
    bottom:15px;
    left:15px;
    right:15px;
    background:#22c55e;
    color:black;
    height:85px;
    font-size:28px;
}

.grayBtn{
    background:#111827;
    color:white;
    margin-bottom:10px;
}

.redBtn{
    background:#ef4444;
    color:white;
}

.stat{
    background:#6d28d9;
    padding:15px;
    border-radius:18px;
}

.row{
    display:flex;
    justify-content:space-between;
    font-size:20px;
    margin:6px 0;
}

.success{
    display:none;
    text-align:center;
    font-size:20px;
    font-weight:800;
    color:#22c55e;
}

#kartonBox{
    display:none;
}

</style>
</head>

<body>

<div class="header">📦 Raktár PRO</div>

<div class="success" id="ok">✓ MENTVE</div>

<div class="kgBox">
    <div class="kgBig" id="kgSum">0</div>
    KG
</div>

<button class="grayBtn" onclick="togglePentek()" id="pBtn">
Megint péntek? ❌
</button>

<div class="card">
<label>TÉTEL</label>
<input id="t" type="tel" inputmode="numeric">
</div>

<div class="card" id="kartonBox">
<label>KARTON</label>
<input id="k" type="tel" inputmode="numeric">
</div>

<div class="card">
<label>SÚLY</label>
<input id="kg" type="tel" inputmode="numeric">
</div>

<div class="stat">
<div class="row">Tétel <span id="st">0</span></div>
<div class="row">Karton <span id="sk">0</span></div>
<div class="row"><b>Napi egység</b> <b id="se">0</b></div>
</div>

<button class="redBtn" onclick="resetDay()">Új nap</button>

<button class="saveBtn" onclick="add()">HOZZÁADÁS</button>

<script>
let pentek=false;

let st=+localStorage.getItem("st")||0;
let sk=+localStorage.getItem("sk")||0;
let sg=+localStorage.getItem("sg")||0;

function render(){
    document.getElementById("st").innerText=st;
    document.getElementById("sk").innerText=sk;
    document.getElementById("kgSum").innerText=sg;

    let sum = pentek ? (st+sk+sg) : (st+sg);
    document.getElementById("se").innerText=sum;
}

render();

function togglePentek(){
    pentek=!pentek;

    document.getElementById("kartonBox").style.display=
    pentek?"block":"none";

    document.getElementById("pBtn").innerText=
    pentek?"Megint péntek? ✅":"Megint péntek? ❌";
}

function add(){

    let t=+document.getElementById("t").value||0;
    let k=+document.getElementById("k").value||0;
    let g=+document.getElementById("kg").value||0;

    st+=t;
    sg+=g;

    if(pentek) sk+=k;

    localStorage.setItem("st",st);
    localStorage.setItem("sk",sk);
    localStorage.setItem("sg",sg);

    render();

    document.getElementById("t").value="";
    document.getElementById("k").value="";
    document.getElementById("kg").value="";

    document.getElementById("ok").style.display="block";
    setTimeout(()=>document.getElementById("ok").style.display="none",900);
}

function resetDay(){
    if(confirm("Biztos új nap?")){
        localStorage.clear();
        st=sk=sg=0;
        render();
    }
}

if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
