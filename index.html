<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Raktár PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#581c87">

<style>
body{
    margin:0;
    padding:20px;
    padding-bottom:140px;
    background:#581c87;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.header{
    background:#7c3aed;
    padding:18px;
    border-radius:18px;
    text-align:center;
    font-size:22px;
    font-weight:800;
    margin-bottom:15px;
}

.box{
    background:#6d28d9;
    border-radius:18px;
    padding:15px;
    margin-bottom:12px;
}

label{
    font-size:13px;
    opacity:0.8;
}

input{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:32px;
    background:#4c1d95;
    color:white;
    font-weight:700;
}

button{
    width:100%;
    border:none;
    border-radius:16px;
    padding:18px;
    font-size:20px;
    font-weight:900;
}

.saveBtn{
    position:fixed;
    bottom:15px;
    left:15px;
    right:15px;
    background:#22c55e;
    color:black;
    height:85px;
    font-size:28px;
}

.gray{
    background:#111827;
    color:white;
    margin-bottom:10px;
}

.stat{
    background:#6d28d9;
    padding:15px;
    border-radius:18px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:6px 0;
    font-size:20px;
}

#kartonBox{
    display:none;
}
</style>
</head>

<body>

<div class="header">📦 Raktár PRO</div>

<button class="gray" onclick="toggle()">Megint péntek? ❌</button>

<div class="box">
<label>TÉTEL</label>
<input id="t" type="tel" inputmode="numeric">
</div>

<div class="box" id="kartonBox">
<label>KARTON</label>
<input id="k" type="tel" inputmode="numeric">
</div>

<div class="box">
<label>SÚLY</label>
<input id="g" type="tel" inputmode="numeric">
</div>

<div class="stat">
<div class="row">Tétel <span id="st">0</span></div>
<div class="row">Karton <span id="sk">0</span></div>
<div class="row"><b>Napi egység</b> <b id="sum">0</b></div>
</div>

<button onclick="osszesites()" class="gray">📊 ÖSSZESÍTÉS</button>

<button class="saveBtn" onclick="add()">HOZZÁADÁS</button>

<script>

let pentek=false;

let st=0;
let sk=0;
let sg=0;

function toggle(){
    pentek=!pentek;
    document.getElementById("kartonBox").style.display=
    pentek?"block":"none";
}

function add(){

    let t=+t.value||+document.getElementById("t").value||0;
    let k=+document.getElementById("k").value||0;
    let g=+document.getElementById("g").value||0;

    st+=t;
    sg+=g;

    if(pentek) sk+=k;

    document.getElementById("st").innerText=st;
    document.getElementById("sk").innerText=sk;

    document.getElementById("t").value="";
    document.getElementById("k").value="";
    document.getElementById("g").value="";

    calc();
}

function osszesites(){
    calc();
}

function calc(){
    let sum = pentek ? (st+sk+sg) : (st+sg);
    document.getElementById("sum").innerText=sum;
}

if('serviceWorker' in navigator){
    navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
