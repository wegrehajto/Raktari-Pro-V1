<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Szedőcsicska V2</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<style>
body{
    margin:0;
    padding:16px;
    padding-bottom:40px;
    background:#111827;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.header{
    background:#374151;
    padding:14px;
    border-radius:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:800;
    margin-bottom:12px;
}

.menuBtn{
    width:auto;
    padding:10px 14px;
    font-size:14px;
    border-radius:12px;
    background:#111827;
    color:white;
}

.card{
    background:#1f2937;
    border-radius:14px;
    padding:12px;
    margin-bottom:10px;
}

input{
    width:100%;
    box-sizing:border-box;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:28px;
    background:#374151;
    color:white;
    font-weight:700;
}

button{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:18px;
    font-weight:800;
}

.grayBtn{
    background:#4b5563;
    color:white;
    margin-bottom:10px;
}

.closeDayBtn{
    background:#4b5563;
    color:white;
    margin-top:12px;
    padding:12px;
    font-size:15px;
    font-weight:700;
}

.stat{
    background:#1f2937;
    padding:14px;
    border-radius:14px;
    margin-top:10px;
    margin-bottom:10px;
}

.row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    font-size:18px;
    margin:6px 0;
}

.small{
    font-size:13px;
    opacity:0.7;
}

.weightBanner{
    position:sticky;
    top:0;
    z-index:999;
    background:#dc2626;
    color:white;
    text-align:center;
    font-size:18px;
    font-weight:800;
    padding:10px;
    border-radius:12px;
    margin-bottom:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
}

#kartonBox{
    display:none;
}

/* MENU */
.menuOverlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    z-index:2000;
    padding:14px;
}

.menuPanel{
    background:#111827;
    border:1px solid #374151;
    border-radius:18px;
    height:calc(100vh - 28px);
    overflow:auto;
    padding:14px;
    box-sizing:border-box;
}

.menuHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.menuTitle{
    font-size:22px;
    font-weight:900;
}

.menuClose{
    width:auto;
    padding:10px 14px;
    background:#374151;
    color:white;
    font-size:16px;
}

.menuTabs{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-bottom:12px;
}

.menuTab{
    padding:12px 8px;
    font-size:14px;
    background:#374151;
    color:white;
}

.menuTab.active{
    background:#22c55e;
    color:#000;
}

.menuCard{
    background:#1f2937;
    border-radius:14px;
    padding:12px;
    margin-bottom:10px;
}

.menuCardTitle{
    font-size:16px;
    font-weight:900;
    margin-bottom:6px;
}

.menuLine{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin:5px 0;
    font-size:15px;
}

.good{
    color:#22c55e;
    font-weight:900;
}

.bad{
    color:#ef4444;
    font-weight:900;
}

.empty{
    opacity:.75;
    text-align:center;
    padding:18px;
}
</style>
</head>

<body>

<div class="header">
    <div>📦 Szedőcsicska V2</div>
    <button class="menuBtn" onclick="openMenu()">☰ Menü</button>
</div>

<div id="weightBanner" class="weightBanner">
    0 kg
</div>

<button class="grayBtn" onclick="toggleKartonMod()" id="pbtn">
Karton mód
</button>

<div class="card">
    <div class="small">TÉTEL</div>
    <input id="t" type="tel" inputmode="numeric">
</div>

<div class="card" id="kartonBox">
    <div class="small">KARTON</div>
    <input id="k" type="tel" inputmode="numeric">
</div>

<div class="card">
    <div class="small">SÚLY</div>
    <input id="s" type="tel" inputmode="numeric">
</div>

<div class="stat">
    <div class="row">Tétel <span id="st">0</span></div>
    <div class="row">Karton <span id="sk">0</span></div>
    <div class="row">Egység <span id="sum">0</span></div>
</div>

<button class="grayBtn" onclick="add()">➕ HOZZÁADÁS</button>

<button class="closeDayBtn" onclick="closePicking()">
📅 Szedés lezárása
</button>

<!-- MENU -->
<div id="menuOverlay" class="menuOverlay">
    <div class="menuPanel">

        <div class="menuHeader">
            <div class="menuTitle">☰ Menü</div>
            <button class="menuClose" onclick="closeMenu()">✕</button>
        </div>

        <div class="menuTabs">
            <button class="menuTab active" data-tab="szedesek" onclick="showMenuTab('szedesek')">
                Szedések
            </button>
            <button class="menuTab" data-tab="napok" onclick="showMenuTab('napok')">
                Napok
            </button>
            <button class="menuTab" data-tab="atlagok" onclick="showMenuTab('atlagok')">
                Átlagok
            </button>
        </div>

        <div id="menuContent"></div>

    </div>
</div>

<script>
let kartonMod = false;

function getTodayKey(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
}

let today = getTodayKey();

let data = JSON.parse(localStorage.getItem("data") || "{}");
let closedPickings = JSON.parse(localStorage.getItem("closedPickings") || "[]");

if(!data[today]){
    data[today] = { tetel:0, karton:0, suly:0 };
}

function saveData(){
    localStorage.setItem("data", JSON.stringify(data));
}

function saveClosed(){
    localStorage.setItem("closedPickings", JSON.stringify(closedPickings));
}

function fmt(n){
    return Number(n || 0).toLocaleString("hu-HU");
}

function getEgyseg(tetel, suly){
    return Number(tetel || 0) + Number(suly || 0);
}

function toggleKartonMod(){
    kartonMod = !kartonMod;

    document.getElementById("kartonBox").style.display =
        kartonMod ? "block" : "none";

    document.getElementById("pbtn").innerText =
        kartonMod ? "Karton mód ✅" : "Karton mód";
}

function add(){
    const t = Number(document.getElementById("t").value) || 0;
    const k = Number(document.getElementById("k").value) || 0;
    const s = Number(document.getElementById("s").value) || 0;

    if(s > 750){
        const biztos = confirm(
            "Tolnak csicska?\n\n" +
            s + " kg került megadásra."
        );

        if(!biztos){
            document.getElementById("s").focus();
            return;
        }
    }

    if(t === 0 && k === 0 && s === 0) return;

    data[today].tetel += t;
    data[today].karton += kartonMod ? k : 0;
    data[today].suly += s;

    saveData();
    render();

    document.getElementById("t").value = "";
    document.getElementById("k").value = "";
    document.getElementById("s").value = "";

    document.getElementById("t").focus();
}

function render(){
    if(!data[today]){
        data[today] = { tetel:0, karton:0, suly:0 };
        saveData();
    }

    const d = data[today];

    const banner = document.getElementById("weightBanner");
    banner.innerText = fmt(d.suly) + " kg";

    if(d.suly < 10000){
        banner.style.background = "#dc2626";
        banner.style.color = "#fff";
    }
    else if(d.suly < 13000){
        banner.style.background = "#16a34a";
        banner.style.color = "#fff";
    }
    else{
        banner.style.background = "#eab308";
        banner.style.color = "#000";
    }

    document.getElementById("st").innerText = fmt(d.tetel);
    document.getElementById("sk").innerText = fmt(d.karton);

    document.getElementById("sum").innerText =
        fmt(getEgyseg(d.tetel, d.suly));
}

function closePicking(){
    const d = data[today];

    if(d.tetel === 0 && d.karton === 0 && d.suly === 0){
        alert("Nincs mit lezárni.");
        return;
    }

    if(!confirm("Biztosan le akarod zárni a szedést?")) return;

    const now = new Date();

    const record = {
        id: Date.now(),
        datum: today,
        ido: now.toLocaleTimeString("hu-HU", {
            hour:"2-digit",
            minute:"2-digit"
        }),
        tetel: d.tetel,
        karton: d.karton,
        suly: d.suly,
        egyseg: getEgyseg(d.tetel, d.suly)
    };

    closedPickings.push(record);
    saveClosed();

    data[today] = { tetel:0, karton:0, suly:0 };
    saveData();

    render();

    document.getElementById("t").value = "";
    document.getElementById("k").value = "";
    document.getElementById("s").value = "";

    kartonMod = false;
    document.getElementById("kartonBox").style.display = "none";
    document.getElementById("pbtn").innerText = "Karton mód";

    document.getElementById("t").focus();

    alert(
        "Szedés lezárva!\n\n" +
        "Tétel: " + fmt(record.tetel) + "\n" +
        "Karton: " + fmt(record.karton) + "\n" +
        "Súly: " + fmt(record.suly) + " kg\n" +
        "Egység: " + fmt(record.egyseg)
    );
}

/* ENTER FLOW */
document.getElementById("t").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        if(kartonMod){
            document.getElementById("k").focus();
        }else{
            document.getElementById("s").focus();
        }
    }
});

document.getElementById("k").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        document.getElementById("s").focus();
    }
});

document.getElementById("s").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        add();
    }
});

/* MENU */
function openMenu(){
    document.getElementById("menuOverlay").style.display = "block";
    showMenuTab("szedesek");
}

function closeMenu(){
    document.getElementById("menuOverlay").style.display = "none";
}

function showMenuTab(tab){
    document.querySelectorAll(".menuTab").forEach(btn=>{
        btn.classList.remove("active");
        if(btn.dataset.tab === tab){
            btn.classList.add("active");
        }
    });

    const box = document.getElementById("menuContent");

    if(tab === "szedesek"){
        box.innerHTML = renderSzedesek();
    }

    if(tab === "napok"){
        box.innerHTML = renderNapok();
    }

    if(tab === "atlagok"){
        box.innerHTML = renderAtlagok();
    }
}

function getDayStats(){
    const map = {};

    closedPickings.forEach(r=>{
        const datum = r.datum || "Ismeretlen";

        if(!map[datum]){
            map[datum] = {
                datum:datum,
                tetel:0,
                karton:0,
                suly:0,
                egyseg:0,
                db:0
            };
        }

        const tetel = Number(r.tetel || 0);
        const karton = Number(r.karton || 0);
        const suly = Number(r.suly || 0);

        map[datum].tetel += tetel;
        map[datum].karton += karton;
        map[datum].suly += suly;
        map[datum].egyseg += getEgyseg(tetel, suly);
        map[datum].db++;
    });

    return Object.values(map).sort((a,b)=> b.datum.localeCompare(a.datum));
}

function renderSzedesek(){
    if(closedPickings.length === 0){
        return `<div class="empty">Még nincs lezárt szedés.</div>`;
    }

    const list = closedPickings
        .slice()
        .sort((a,b)=> b.id - a.id);

    return list.map(r=>{
        const tetel = Number(r.tetel || 0);
        const karton = Number(r.karton || 0);
        const suly = Number(r.suly || 0);
        const egyseg = getEgyseg(tetel, suly);

        return `
            <div class="menuCard">
                <div class="menuCardTitle">${r.datum} - ${r.ido}</div>
                <div class="menuLine"><span>Súly</span><b>${fmt(suly)} kg</b></div>
                <div class="menuLine"><span>Tétel</span><b>${fmt(tetel)}</b></div>
                <div class="menuLine"><span>Karton</span><b>${fmt(karton)}</b></div>
                <div class="menuLine"><span>Egység</span><b>${fmt(egyseg)}</b></div>
            </div>
        `;
    }).join("");
}

function renderNapok(){
    const days = getDayStats();

    if(days.length === 0){
        return `<div class="empty">Még nincs lezárt nap.</div>`;
    }

    return days.map(d=>`
        <div class="menuCard">
            <div class="menuCardTitle">${d.datum}</div>
            <div class="menuLine"><span>Szedések száma</span><b>${fmt(d.db)}</b></div>
            <div class="menuLine"><span>Súly</span><b>${fmt(d.suly)} kg</b></div>
            <div class="menuLine"><span>Tétel</span><b>${fmt(d.tetel)}</b></div>
            <div class="menuLine"><span>Karton</span><b>${fmt(d.karton)}</b></div>
            <div class="menuLine"><span>Egység</span><b>${fmt(d.egyseg)}</b></div>
        </div>
    `).join("");
}

function renderAtlagok(){
    const days = getDayStats();

    if(days.length === 0 || closedPickings.length === 0){
        return `<div class="empty">Még nincs elég adat az átlagokhoz.</div>`;
    }

    const totalSuly = days.reduce((sum,d)=>sum + d.suly, 0);
    const totalTetel = days.reduce((sum,d)=>sum + d.tetel, 0);
    const totalKarton = days.reduce((sum,d)=>sum + d.karton, 0);
    const totalEgyseg = days.reduce((sum,d)=>sum + d.egyseg, 0);

    const avgDaySuly = Math.round(totalSuly / days.length);
    const avgDayTetel = Math.round(totalTetel / days.length);
    const avgDayEgyseg = Math.round(totalEgyseg / days.length);
    const avgSzedesSuly = Math.round(totalSuly / closedPickings.length);

    const currentMonth = today.slice(0,7);
    const monthDays = days.filter(d=>d.datum.startsWith(currentMonth));

    const monthSuly = monthDays.reduce((sum,d)=>sum + d.suly, 0);
    const monthTetel = monthDays.reduce((sum,d)=>sum + d.tetel, 0);
    const monthEgyseg = monthDays.reduce((sum,d)=>sum + d.egyseg, 0);

    const monthAvgSuly = monthDays.length ? Math.round(monthSuly / monthDays.length) : 0;
    const monthAvgTetel = monthDays.length ? Math.round(monthTetel / monthDays.length) : 0;
    const monthAvgEgyseg = monthDays.length ? Math.round(monthEgyseg / monthDays.length) : 0;

    const kartonosNapok = days.filter(d=>d.karton > 0);
    const avgKartonKartonNapokon = kartonosNapok.length
        ? Math.round(totalKarton / kartonosNapok.length)
        : 0;

    const bestDay = days.reduce((best,d)=> d.suly > best.suly ? d : best, days[0]);
    const worstDay = days.reduce((worst,d)=> d.suly < worst.suly ? d : worst, days[0]);

    return `
        <div class="menuCard">
            <div class="menuCardTitle">📊 Összesített adatok</div>
            <div class="menuLine"><span>Lezárt napok</span><b>${fmt(days.length)}</b></div>
            <div class="menuLine"><span>Lezárt szedések</span><b>${fmt(closedPickings.length)}</b></div>
            <div class="menuLine"><span>Össz súly</span><b>${fmt(totalSuly)} kg</b></div>
            <div class="menuLine"><span>Össz tétel</span><b>${fmt(totalTetel)}</b></div>
            <div class="menuLine"><span>Össz karton</span><b>${fmt(totalKarton)}</b></div>
            <div class="menuLine"><span>Össz egység</span><b>${fmt(totalEgyseg)}</b></div>
        </div>

        <div class="menuCard">
            <div class="menuCardTitle">📈 Átlagok</div>
            <div class="menuLine"><span>Napi átlag súly</span><b>${fmt(avgDaySuly)} kg</b></div>
            <div class="menuLine"><span>Napi átlag tétel</span><b>${fmt(avgDayTetel)}</b></div>
            <div class="menuLine"><span>Napi átlag egység</span><b>${fmt(avgDayEgyseg)}</b></div>
            <div class="menuLine"><span>Szedésenkénti átlag súly</span><b>${fmt(avgSzedesSuly)} kg</b></div>
        </div>

        <div class="menuCard">
            <div class="menuCardTitle">📅 Aktuális havi átlagok</div>
            <div class="menuLine"><span>Havi átlag súly</span><b>${fmt(monthAvgSuly)} kg</b></div>
            <div class="menuLine"><span>Havi átlag tétel</span><b>${fmt(monthAvgTetel)}</b></div>
            <div class="menuLine"><span>Havi átlag egység</span><b>${fmt(monthAvgEgyseg)}</b></div>
        </div>

        <div class="menuCard">
            <div class="menuCardTitle">📦 Karton külön statisztika</div>
            <div class="menuLine"><span>Össz karton</span><b>${fmt(totalKarton)}</b></div>
            <div class="menuLine"><span>Kartonos napok</span><b>${fmt(kartonosNapok.length)}</b></div>
            <div class="menuLine"><span>Átlag karton / kartonos nap</span><b>${fmt(avgKartonKartonNapokon)}</b></div>
        </div>

        <div class="menuCard">
            <div class="menuCardTitle">🏆 Legjobb nap</div>
            <div class="menuLine"><span>Dátum</span><b class="good">${bestDay.datum}</b></div>
            <div class="menuLine"><span>Súly alapján</span><b class="good">${fmt(bestDay.suly)} kg</b></div>
            <div class="menuLine"><span>Tétel</span><b>${fmt(bestDay.tetel)}</b></div>
            <div class="menuLine"><span>Egység</span><b>${fmt(bestDay.egyseg)}</b></div>
        </div>

        <div class="menuCard">
            <div class="menuCardTitle">🐌 Legrosszabb nap</div>
            <div class="menuLine"><span>Dátum</span><b class="bad">${worstDay.datum}</b></div>
            <div class="menuLine"><span>Súly alapján</span><b class="bad">${fmt(worstDay.suly)} kg</b></div>
            <div class="menuLine"><span>Tétel</span><b>${fmt(worstDay.tetel)}</b></div>
            <div class="menuLine"><span>Egység</span><b>${fmt(worstDay.egyseg)}</b></div>
        </div>
    `;
}

render();

if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
