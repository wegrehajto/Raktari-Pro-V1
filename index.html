<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Raktár App</title>

<style>

body{
    margin:0;
    padding:16px;
    padding-bottom:120px;
    background:#111827;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.header{
    background:#374151;
    padding:16px;
    border-radius:14px;
    text-align:center;
    font-size:20px;
    font-weight:800;
    margin-bottom:12px;
}

.card{
    background:#1f2937;
    border-radius:14px;
    padding:12px;
    margin-bottom:10px;
}

label{
    font-size:13px;
    opacity:0.7;
}

input{
    width:100%;
    box-sizing:border-box;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:30px;
    background:#374151;
    color:white;
    font-weight:700;
}

button{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:18px;
    font-weight:800;
}

.saveBtn{
    position:fixed;
    left:12px;
    right:12px;
    bottom:12px;
    height:70px;
    background:#22c55e;
    color:black;
}

.grayBtn{
    background:#4b5563;
    color:white;
    margin-bottom:10px;
}

.stat{
    background:#1f2937;
    padding:14px;
    border-radius:14px;
}

.row{
    display:flex;
    justify-content:space-between;
    font-size:18px;
    margin:6px 0;
}

#kartonBox{
    display:none;
}

.success{
    display:none;
    text-align:center;
    color:#22c55e;
    font-weight:800;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="header">📦 Raktár App</div>

<div id="ok" class="success">✓ MENTVE</div>

<button class="grayBtn" onclick="togglePentek()" id="pbtn">
Megint péntek? ❌
</button>

<div class="card">
<label>TÉTEL</label>
<input id="tetel" type="tel" inputmode="numeric">
</div>

<div class="card" id="kartonBox">
<label>KARTON</label>
<input id="karton" type="tel" inputmode="numeric">
</div>

<div class="card">
<label>SÚLY</label>
<input id="suly" type="tel" inputmode="numeric">
</div>

<div class="stat">
<div class="row">Tétel <span id="st">0</span></div>
<div class="row">Karton <span id="sk">0</span></div>
<div class="row"><b>Napi egység</b> <b id="sum">0</b></div>
</div>

<button class="saveBtn" onclick="hozzaad()">HOZZÁADÁS</button>

<script>

let pentek = false;

let st = 0;
let sk = 0;
let sg = 0;

function togglePentek(){

    pentek = !pentek;

    document.getElementById("kartonBox").style.display =
    pentek ? "block" : "none";

    document.getElementById("pbtn").innerText =
    pentek ? "Megint péntek? ✅" : "Megint péntek? ❌";
}

function hozzaad(){

    const t = Number(document.getElementById("tetel").value) || 0;
    const k = Number(document.getElementById("karton").value) || 0;
    const s = Number(document.getElementById("suly").value) || 0;

    if(t === 0 && s === 0) return;

    st += t;
    sg += s;

    if(pentek) sk += k;

    document.getElementById("st").innerText = st;
    document.getElementById("sk").innerText = sk;

    let sum = pentek ? (st + sk + sg) : (st + sg);
    document.getElementById("sum").innerText = sum;

    document.getElementById("tetel").value = "";
    document.getElementById("karton").value = "";
    document.getElementById("suly").value = "";

    document.getElementById("tetel").focus();

    const ok = document.getElementById("ok");
    ok.style.display = "block";

    setTimeout(()=> ok.style.display = "none", 800);
}

</script>

</body>
</html>
