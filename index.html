<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Szedőcsicska V2</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<style>
body{
    margin:0;
    padding:16px;
    padding-bottom:40px;
    background:#111827;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.header{
    background:#374151;
    padding:14px;
    border-radius:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:800;
    margin-bottom:12px;
}

.dangerBtn{
    background:#7f1d1d;
    color:white;
    margin-top:16px;
    padding:14px;
    font-size:15px;
    font-weight:800;
    border:1px solid #ef4444;
}
    
.menuBtn{
    width:auto;
    padding:10px 14px;
    font-size:14px;
    border-radius:12px;
    background:#111827;
    color:white;
}

.card{
    background:#1f2937;
    border-radius:14px;
    padding:12px;
    margin-bottom:10px;
}

input{
    width:100%;
    box-sizing:border-box;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:28px;
    background:#374151;
    color:white;
    font-weight:700;
}

button{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:18px;
    font-weight:800;
}

.grayBtn{
    background:#4b5563;
    color:white;
    margin-bottom:10px;
}

.closeDayBtn{
    background:#7f1d1d;
    color:white;
    margin-top:12px;
    padding:12px;
    font-size:15px;
    font-weight:800;
    border:1px solid #ef4444;
}

.stat{
    background:#1f2937;
    padding:14px;
    border-radius:14px;
    margin-top:10px;
    margin-bottom:10px;
}

.row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    font-size:18px;
    margin:6px 0;
}

.creatorFooter{
    text-align:center;
    font-size:12px;
    opacity:0.55;
    margin-top:18px;
    margin-bottom:10px;
    color:#d1d5db;
}
    
.small{
    font-size:13px;
    opacity:0.7;
}

.weightBanner{
    position:sticky;
    top:0;
    z-index:999;
    background:#dc2626;
    color:white;
    text-align:center;
    font-size:18px;
    font-weight:800;
    padding:10px;
    border-radius:12px;
    margin-bottom:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
}

#kartonBox{
    display:none;
}

/* MENU */
.menuOverlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    z-index:2000;
    padding:14px;
}

.menuPanel{
    background:#111827;
    border:1px solid #374151;
    border-radius:18px;
    height:calc(100vh - 28px);
    overflow:auto;
    padding:14px;
    box-sizing:border-box;
}

.menuHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.menuTitle{
    font-size:22px;
    font-weight:900;
}

.quoteBox{
    display:none;
    background:#1f2937;
    color:#d1d5db;
    border-left:4px solid #22c55e;
    border-radius:12px;
    padding:10px 12px;
    margin-bottom:12px;
    font-size:13px;
    font-weight:600;
    line-height:1.35;
    opacity:0.95;
}
    
.menuClose{
    width:auto;
    padding:10px 14px;
    background:#374151;
    color:white;
    font-size:16px;
}

.menuTabs{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:12px;
}

.menuTab{
    padding:12px 8px;
    font-size:14px;
    background:#374151;
    color:white;
}

.menuTab.active{
    background:#22c55e;
    color:#000;
}

.menuCard{
    background:#1f2937;
    border-radius:14px;
    padding:12px;
    margin-bottom:10px;
}

.menuCardTitle{
    font-size:16px;
    font-weight:900;
    margin-bottom:6px;
}

.menuLine{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin:5px 0;
    font-size:15px;
}

.good{
    color:#22c55e;
    font-weight:900;
}

.bad{
    color:#ef4444;
    font-weight:900;
}

.empty{
    opacity:.75;
    text-align:center;
    padding:18px;
}
</style>
</head>

<body>

<div class="header">
    <div>📦 Szedőcsicska V2</div>
    <button class="menuBtn" onclick="openMenu()">☰ Menü</button>
</div>

<div id="weightBanner" class="weightBanner">
    0 kg
</div>

<div id="quoteBox" class="quoteBox">
    Mai bölcsesség...
</div>

<button class="grayBtn" onclick="toggleKartonMod()" id="pbtn">
Karton mód
</button>

<div class="card">
    <div class="small">TÉTEL</div>
    <input id="t" type="tel" inputmode="numeric">
</div>

<div class="card" id="kartonBox">
    <div class="small">KARTON</div>
    <input id="k" type="tel" inputmode="numeric">
</div>

<div class="card">
    <div class="small">SÚLY</div>
    <input id="s" type="tel" inputmode="numeric">
</div>

<div class="stat">
    <div class="row">Tétel <span id="st">0</span></div>
    <div class="row">Karton <span id="sk">0</span></div>
    <div class="row">Egység <span id="sum">0</span></div>
</div>

<button class="grayBtn" onclick="add()">➕ HOZZÁADÁS</button>

<button class="closeDayBtn" onclick="closePicking()">
📅 Szedés lezárása
</button>

<div class="creatorFooter">
    © 2026 Horváth Balázs · Szedőcsicska V2 · All rights reserved.
</div>

<!-- MENU -->
<div id="menuOverlay" class="menuOverlay">
    <div class="menuPanel">

        <div class="menuHeader">
            <div class="menuTitle">☰ Menü</div>
            <button class="menuClose" onclick="closeMenu()">✕</button>
        </div>

        <div class="menuTabs">
    <button class="menuTab active" data-tab="szedesek" onclick="showMenuTab('szedesek')">
        Szedések
    </button>

    <button class="menuTab" data-tab="napok" onclick="showMenuTab('napok')">
        Napok
    </button>

    <button class="menuTab" data-tab="atlagok" onclick="showMenuTab('atlagok')">
        Átlagok
    </button>

    <button class="menuTab" data-tab="changelog" onclick="showMenuTab('changelog')">
        Changelog
    </button>
</div>

        <div id="menuContent"></div>
        
        <button class="dangerBtn" onclick="deleteAllData()">
🗑️ Összes adat törlése
</button>

    </div>
</div>

<script>
let kartonMod = false;

function getTodayKey(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
}

let today = getTodayKey();

let data = JSON.parse(localStorage.getItem("data") || "{}");
let closedPickings = JSON.parse(localStorage.getItem("closedPickings") || "[]");

if(!data[today]){
    data[today] = { tetel:0, karton:0, suly:0 };
}

function saveData(){
    localStorage.setItem("data", JSON.stringify(data));
}

function saveClosed(){
    localStorage.setItem("closedPickings", JSON.stringify(closedPickings));
}

function fmt(n){
    return Number(n || 0).toLocaleString("hu-HU");
}

function getEgyseg(tetel, suly){
    return Number(tetel || 0) + Number(suly || 0);
}

function toggleKartonMod(){
    kartonMod = !kartonMod;

    const box = document.getElementById("kartonBox");
    const btn = document.getElementById("pbtn");

    if(box){
        box.style.display = kartonMod ? "block" : "none";
    }

    if(btn){
        btn.innerText = kartonMod ? "Karton mód ✅" : "Karton mód";
    }
}

// régi név kompatibilitás miatt
function togglePentek(){
    toggleKartonMod();
}

function add(){

    const tInput = document.getElementById("t");
    const kInput = document.getElementById("k");
    const sInput = document.getElementById("s");

    const t = Number(tInput.value) || 0;
    const k = Number(kInput.value) || 0;
    const s = Number(sInput.value) || 0;

    if(t === 0){
        alert("0 tétellel nem lehet hozzáadni.");
        tInput.focus();
        return;
    }

    if(s > 750){
        const biztos = confirm(
            "Kurva érdekes..\n\n" +
            "Biztos ennyi?\n\n" +
            s + " kg"
        );

        if(!biztos){
            sInput.focus();
            return;
        }
    }

    if(!data[today]){
        data[today] = { tetel:0, karton:0, suly:0 };
    }

    data[today].tetel += t;
    data[today].karton += kartonMod ? k : 0;
    data[today].suly += s;

    saveData();

    tInput.value = "";
    kInput.value = "";
    sInput.value = "";

    render();

    setTimeout(function(){
        tInput.focus();
    }, 100);
}

function render(){

    if(!data[today]){
        data[today] = { tetel:0, karton:0, suly:0 };
        saveData();
    }

    const d = data[today];

    const banner = document.getElementById("weightBanner");

    if(banner){
        banner.innerText = fmt(d.suly) + " kg";

        if(d.suly < 10000){
            banner.style.background = "#dc2626";
            banner.style.color = "#fff";
        }
        else if(d.suly < 13000){
            banner.style.background = "#16a34a";
            banner.style.color = "#fff";
        }
        else{
            banner.style.background = "#eab308";
            banner.style.color = "#000";
        }
    }

    const stEl = document.getElementById("st");
    const skEl = document.getElementById("sk");
    const sumEl = document.getElementById("sum");

    if(stEl){
        stEl.innerText = fmt(d.tetel);
    }

    if(skEl){
        skEl.innerText = fmt(d.karton);
    }

    if(sumEl){
        sumEl.innerText = fmt(getEgyseg(d.tetel, d.suly));
    }
}

function closePicking(){

    const d = data[today];

    if(d.tetel === 0 && d.karton === 0 && d.suly === 0){
        alert("Nincs mit lezárni.");
        return;
    }

    if(!confirm("Biztosan le akarod zárni a szedést?")) return;

    const now = new Date();

    const record = {
        id: Date.now(),
        datum: today,
        ido: now.toLocaleTimeString("hu-HU", {
            hour:"2-digit",
            minute:"2-digit"
        }),
        tetel: d.tetel,
        karton: d.karton,
        suly: d.suly,
        egyseg: getEgyseg(d.tetel, d.suly)
    };

    closedPickings.push(record);
    saveClosed();

    data[today] = { tetel:0, karton:0, suly:0 };
    saveData();

    document.getElementById("t").value = "";
    document.getElementById("k").value = "";
    document.getElementById("s").value = "";

    kartonMod = false;

    const box = document.getElementById("kartonBox");
    const btn = document.getElementById("pbtn");

    if(box){
        box.style.display = "none";
    }

    if(btn){
        btn.innerText = "Karton mód";
    }

    render();

    setTimeout(function(){
        document.getElementById("t").focus();
    }, 100);

    alert(
        "Szedés lezárva!\n\n" +
        "Tétel: " + fmt(record.tetel) + "\n" +
        "Karton: " + fmt(record.karton) + "\n" +
        "Súly: " + fmt(record.suly) + " kg\n" +
        "Egység: " + fmt(record.egyseg)
    );
}

// régi név kompatibilitás miatt
function resetDay(){
    closePicking();
}

/* ENTER FLOW */
const tEl = document.getElementById("t");
const kEl = document.getElementById("k");
const sEl = document.getElementById("s");

if(tEl){
    tEl.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            e.preventDefault();

            if(kartonMod){
                kEl.focus();
            }else{
                sEl.focus();
            }
        }
    });
}

if(kEl){
    kEl.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            e.preventDefault();
            sEl.focus();
        }
    });
}

if(sEl){
    sEl.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            e.preventDefault();
            add();
        }
    });
}

render();

if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
